<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<base target="_blank">

    <link rel="stylesheet" href="css/all.min.css" data-version="href">
<link rel="preload" href="webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
<link rel="preload" href="webfonts/fa-regular-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <title>大鹅测试</title>    
<style>

/* ===== 全局重置 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    max-width: 100%;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

html, body {
    max-width: 100vw;
    overflow-x: hidden;
    outline: none;
}

body {
    background: #f5f7fa;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    width: 100%;
    outline: none;
    color: #5f6b7a;
}

/* ===== 硬件加速优化 ===== */
.optimize-gpu,
.local-particle-canvas,
.skill-canvas-container,
.note-card,
.option-item,
.question-item {
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    will-change: transform, opacity;
}

.local-particle-canvas,
.skill-canvas-container {
    contain: strict;
}

/* ===== 字体图标预加载 ===== */
@font-face {
    font-family: 'Font Awesome 5 Free';
    font-style: normal;
    font-display: block;
    src: url('webfonts/fa-solid-900.woff2') format('woff2');
    font-weight: 900;
    unicode-range: U+F000-FFFF;
}

@font-face {
    font-family: 'Font Awesome 5 Free';
    font-style: normal;
    font-display: block;
    src: url('webfonts/fa-regular-400.woff2') format('woff2');
    font-weight: 400;
    unicode-range: U+F000-FFFF;
}

/* 图标预加载容器 */
.preload-icons,
.preload-images {
    position: absolute;
    width: 0;
    height: 0;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    z-index: -9999;
}

.preload-icons::before,
.preload-icons::after {
    display: block;
    font-family: 'Font Awesome 5 Free';
    font-weight: 900;
}

.preload-icons::before {
    content: '\f00c\f00d\f144\f28d\f0c1\f188\f078\f07b\f017\f005\f059\f023\f09c\f15c\f019\f1f8';
}

.preload-icons::after {
    content: '\f08d\f044';
}

/* 图片预加载 */
.preload-images::after {
    content: '';
    display: block;
    background-image: url('images/image1.png'), url('images/image2.png'),
        url('images/image3.png'), url('images/image4.png'),
        url('images/image5.png'), url('images/image6.png'),
        url('images/image7.png'), url('images/image8.png'),
        url('images/image9.png'), url('images/image10.png'),
        url('images/image11.png'), url('images/image12.png'),
        url('images/image13.png'), url('images/image14.png'),
        url('images/image15.png'), url('images/image16.png'),
        url('images/image17.png'), url('images/image18.png'),
        url('images/image19.png'), url('images/image20.png'),
        url('images/image21.png'), url('images/image22.png'),
        url('images/image23.png'), url('images/image24.png'),
        url('images/image25.png'), url('images/image26.png'),
        url('images/image27.png'), url('images/image28.png'),
        url('images/image29.png'), url('images/image30.png'),
        url('images/image31.png'), url('images/image32.png'),
        url('images/image33.png'), url('images/image34.png'),
        url('images/image35.png'), url('images/image36.png'),
        url('images/image37.png'), url('images/image38.png'),
        url('images/image39.png'), url('images/image40.png'),
        url('images/image41.png'), url('images/image42.png'),
        url('images/image43.png'), url('images/image44.png'),
        url('images/image45.png'), url('images/image46.png'),
        url('images/image47.png'), url('images/image48.png');
    background-size: 0;
}

/* ===== 顶部工具栏 ===== */
.toolbar { 
    background: none;
    height: 68px;
    display: flex;
    align-items: center;
    padding: 25px 10px 0px 10px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    justify-content: space-between;
}

.toolbar-left,
.toolbar-center,
.toolbar-right {
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.toolbar-center {
    margin-left: auto;
    margin-right: 0;
}

.toolbar-right:empty {
    display: none;
}

/* 工具栏按钮 */
.toolbar-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    color: #5f6b7a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.2s;
    flex-shrink: 0;
}

.toolbar-btn i {
    font-size: 18px;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.toolbar-btn .fa-undo,
.toolbar-btn .fa-redo {
    font-size: 18px;
    width: 18px;
    height: 18px;
}

.toolbar-btn .fa-times {
    font-size: 18px;
}

.toolbar-btn:hover,
.toolbar-btn.active {
    color: #999;
}

.toolbar-btn.primary {
    background: #5f6b7a;
    color: white;
}

.toolbar-btn.primary:hover {
    background: #f57c00;
}

.toolbar-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
    display: flex;
}

.toolbar-btn.active-format {
    color: #2196F3;
    background: rgba(0,102,204,0.1);
}

.divider {
    width: 1px;
    height: 24px;
    background: #e0e6ed;
    margin: 0 8px;
}

/* ===== 侧滑菜单 ===== */
.menu-mask {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 109;
    display: none;
    animation: fadeIn 0.5s ease;
}

.menu-mask.active {
    display: block;
}

.side-menu {
    position: fixed;
    top: 0;
    left: -280px;
    width: 270px;
    height: 100vh;
    background: #f5f7fa;
    z-index: 110;
    animation: fadeIn 0.5s ease;
    display: flex;
    flex-direction: column;
}

.side-menu.open {
    left: 0;
}

.menu-header {
    height: 68px;
    background: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 20px 0 20px;
}

.menu-header h3 {
    color: #5f6b7a;
    font-size: 16px;
    margin: 0;
}

.menu-header h3 i {
    color: #ffb74d;
    margin: 0 5px;
}

/* 分类列表 */
.category-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 15px;
}

.category-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    padding: 12px 10px;
    margin: 4px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
}

.category-item.active {
    background: #E8F4FF;
}

.category-info {
    display: flex;
    align-items: center;
}

.category-info i {
    color: #5f6b7a;
    margin: 0 5px 0 2px;
}

.add-cat-btn {
    margin: 10px 22px;
    padding: 12px;
    border: 1px dashed #5f6b7a;
    border-radius: 30px;
    background: transparent;
    color: #5f6b7a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

.add-cat-btn i {
    margin-right: 2px;
}

.add-cat-btn:hover {
    background: #E8F4FF;
}

/* ===== 主内容区域 ===== */
.main-content {
    margin-top: 68px;
    height: calc(100vh - 56px);
    overflow-y: auto;
    padding: 0;
    transition: all 0.3s ease;
    width: 100%;
    box-sizing: border-box;
}

#contentArea {
    width: 100%;
    padding: 10px 20px;
    box-sizing: border-box;
}

#contentArea,
.main-content,
.note-editor {
    max-width: 100%;
    overflow-x: hidden;
    box-sizing: border-box;
}

/* ===== 笔记网格 ===== */
.notes-grid {
    display: grid;
    grid-template-columns: 1fr;
    width: 100%;
    max-width: 100%;
    margin: 0;
    box-sizing: border-box;
    animation: fadeIn 0.5s ease;
}

.note-card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    margin-bottom: 6px;
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(0,0,0,0.05);
}

.note-card.exam-card {
    border: 1px solid rgba(167, 194, 204, 0.1);
}

.note-title {
    font-weight: bold;
    font-size: 16px;
    color: #373737;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
}

.note-preview {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
}

.note-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #94a3b8;
    font-size: 12px;
    margin-top: 8px;
}

/* ===== 笔记编辑器 ===== */
.note-editor {
    width: 100%;
    margin: 0 auto;
    animation: fadeIn 0.5s ease;
}

.note-title-input {
    width: 100%;
    font-size: 20px;
    font-weight: 600;
    padding: 0;
    border: none;
    background: #fff;
    color: #0f172a;
    text-overflow: ellipsis;
}

.note-title-input::placeholder,
.note-content-input::placeholder {
    color: #cbd5e1;
}

/* ===== 可编辑内容区域 ===== */
.note-content-editable {
    flex: 1;
    width: 100%;
    max-width: 100%;
    min-height: 0;
    padding: 16px 6px;
    background: #f5f7fa;
    color: #474747;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.8;
    overflow-y: auto;
    overflow-x: hidden;
    white-space: pre-wrap;
    word-wrap: break-word;
    word-break: break-word;
    box-sizing: border-box;
}

.note-content-editable:empty:before {
    content: attr(placeholder);
    color: #cbd5e1;
    pointer-events: none;
}

.note-content-editable * {
    max-width: 100%;
}

.note-content-editable comment,
.note-content-editable .insert-meta {
    display: none;
}

/* ===== 插入链接样式 ===== */
.note-content-editable .inserted-link-wrapper {
    display: inline-flex !important;
    align-items: center !important;
    max-width: 100% !important;
    vertical-align: middle !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
}

.note-content-editable .inserted-title {
    display: inline-flex !important;
    align-items: center !important;
    cursor: pointer;
    -webkit-user-select: none !important;
    user-select: none !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    min-width: 20px !important;
    flex: 0 1 auto !important;
    pointer-events: auto;
    -webkit-user-modify: read-only;
    user-modify: read-only;
    -webkit-user-select: text;
    user-select: text;
    transition: all 0.1s ease;
}

.note-content-editable .inserted-title span,
.note-content-editable .inserted-title i {
    -webkit-user-select: none !important;
    user-select: none !important;
}

.note-content-editable .inserted-title i.fa-sticky-note {
    color: #2196F3;
    font-size: 14px;
    margin-right: 4px;
    cursor: pointer;
    transition: transform 0.2s ease;
    pointer-events: none !important;
}

.note-content-editable .inserted-title i.fa-sticky-note:hover {
    transform: scale(1.1);
}

.inserted-title::before,
.inserted-title::after {
    content: '';
    display: inline-block;
    width: 0;
    height: 0;
}

.inserted-title::selection {
    background: #b0d4ff;
    color: #5f6b7a;
}

.inserted-title::-moz-selection {
    background: #b0d4ff;
    color: #5f6b7a;
}

.inserted-title[style*="font-size"] {
    line-height: 1.5;
}

.note-content-editable .delete-insert-btn,
.note-content-editable .fas.fa-link,
.note-content-editable .fas.fa-file-alt {
    flex-shrink: 0 !important;
    display: inline-block !important;
}

.inserted-link-wrapper {
    display: inline-block;
    white-space: nowrap;
}

.inserted-title * {
    all: inherit;
}

/* ===== Font Awesome 图标修复 ===== */
.inserted-title i.fas,
.inserted-title i.fas,
.inserted-title i.fab {
    font-family: "Font Awesome 5 Free", "Font Awesome 6 Free" !important;
    font-weight: 900 !important;
    display: inline-block !important;
    font-style: normal !important;
    font-variant: normal !important;
    text-rendering: auto !important;
    -webkit-font-smoothing: antialiased !important;
}

/* ===== 图片优化 ===== */
.option-item img {
    opacity: 1;
    transition: opacity 0.1s ease;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    backface-visibility: hidden;
    transform: translateZ(0);
}

/* ===== 空状态 ===== */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #94a3b8;
}

.empty-state i {
    font-size: 64px;
    color: #cbd5e1;
    margin-bottom: 20px;
}

/* ===== 提示框 ===== */
.toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: white;
    padding: 10px 24px;
    border-radius: 40px;
    font-size: 14px;
    z-index: 10000;
    animation: fadeInOut 2s ease;
    max-width: 80%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: inline-block;
    min-width: 100px;
    text-align: center;
    box-sizing: border-box;
}

/* ===== 确认对话框 ===== */
.confirm-dialog {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
}

.confirm-box {
    background: white;
    border-radius: 24px;
    padding: 28px 32px;
    width: 300px;
    text-align: center;
}

.confirm-actions {
    display: flex;
    margin-top: 24px;
    justify-content: center;
}

.confirm-btn {
    padding: 8px 24px;
    border: none;
    border-radius: 30px;
    font-weight: 500;
    cursor: pointer;
}

.confirm-btn.cancel {
    background: #f1f3f5;
    color: #49525e;
}

.confirm-btn.confirm {
    background: #d32f2f;
    color: white;
}

/* ===== 下拉菜单 ===== */
.floating-dropdown {
    animation: dropdownFadeIn 0.15s ease;
    transform-origin: top center;
}

.dropdown {
    position: absolute;
    right: 0;
    top: 12px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    min-width: 130px;
    display: none;
    z-index: 10;
    border: 1px solid #eef2f6;
}

.note-actions:hover .dropdown {
    display: block;
}

.dropdown-item {
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background 0.2s;
    color: #373737;
}

.dropdown-item:hover {
    background: #f5f5f5;
}

.dropdown-item i {
    width: 16px;
    color: #676767;
}

.dropdown-item.delete-note:hover {
    background: #ffebee;
    color: #d32f2f;
}

.dropdown-item.delete-note:hover i {
    color: #d32f2f;
}

.dropdown-item.delete-note i,
.dropdown-item.pin-note i,
.dropdown-item.unpin-note i,
.dropdown-item.export-note i {
    color: #474747;
}

/* ===== 颜色选择器 ===== */
#colorPickerDropdown,
#fontSizeDropdown {
    pointer-events: auto;
    animation: fadeIn 0.15s ease;
}

#fontSizeDropdown {
    max-height: 300px;
    overflow-y: auto;
}

.color-option {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.color-option:hover {
    transform: scale(1.1);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

#customColorPicker {
    cursor: pointer;
    transition: opacity 0.2s ease;
}

#customColorPicker:hover {
    opacity: 0.9;
}

.font-size-option {
    transition: background 0.2s ease;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 4px;
}

.font-size-option:hover {
    background: #f0f0f0;
}

.font-size-option.active {
    background: #e3f2fd;
    color: #2196F3;
}

/* ===== 笔记操作按钮 ===== */
.more-btn {
    background: none;
    border: none;
    width: 24px;
    height: 24px;
    border-radius: 8px;
    cursor: pointer;
    color: #94a3b8;
}

.more-btn:hover {
    background: #f1f5f9;
}

.note-actions {
    position: relative;
}

/* ===== 笔记徽章 ===== */
.master-note-badge,
.referenced-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: help;
    transition: transform 0.2s ease;
}

.master-note-badge:hover,
.referenced-badge:hover {
    transform: scale(1.1);
}

.master-note-badge i {
    filter: drop-shadow(0 2px 2px rgba(255, 152, 0, 0.3));
}

.referenced-badge i {
    filter: drop-shadow(0 2px 2px rgba(76, 175, 80, 0.3));
}

/* ===== 笔记选择器 ===== */
.selector-note-item0 {
    border: 1px solid transparent;
    transition: all 0.2s ease;
}

.selector-note-item0:hover {
    border-color: #2196F3;
    background: #fff8e7;
    box-shadow: 0 2px 8px rgba(255,152,0,0.15);
}

/* ===== 动画 ===== */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

@keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
}

@keyframes slideDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes dropdownFadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes springPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    50% { transform: scale(0.95); }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

@keyframes barWave {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.5); }
}

@keyframes shake {
    0%, 100% { transform: translateY(-50%) translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateY(-50%) translateX(-1px); }
    20%, 40%, 60%, 80% { transform: translateY(-50%) translateX(1px); }
}

@keyframes correctSpin {
    0% { transform: rotate(-180deg) scale(0); opacity: 0; }
    100% { transform: rotate(0) scale(1); opacity: 1; }
}

/* ===== 音频播放动画 ===== */
.audio-play-icon {
    transition: all 0.2s ease;
}

.audio-play-icon.playing {
    animation: springPulse 1s infinite ease;
    color: #f44336 !important;
}

.shake-animation {
    animation: shake 0.5s ease-in-out;
}

/* ===== 杂项 ===== */
pre {
    /* 保留用于显示JSON等 */
}

</style>
</head>

    <script>

// ===== 自动版本管理 + 智能更新检测 =====
// ===== 静态资源服务器地址 =====
const STATIC_BASE_URL = 'https://87295480.github.io';
const VERSION_JSON_URL = STATIC_BASE_URL + '/version.json';
const PACKAGE_CACHE_KEY = 'cached_wgt_info';

// ===== 全局版本号 =====
window.APP_VERSION = 'v1.09';

// ===== 缓存管理函数 =====
function savePackageInfo(version, filePath) {
    if (!version || !filePath) return;
    localStorage.setItem(PACKAGE_CACHE_KEY, JSON.stringify({
        version: version,
        path: filePath,
        timestamp: Date.now()
    }));
    console.log('已缓存安装包:', version, filePath);
}

function checkCachedPackage(version) {
    const cached = localStorage.getItem(PACKAGE_CACHE_KEY);
    if (!cached) return null;
    try {
        const info = JSON.parse(cached);
        if (info.version === version && Date.now() - info.timestamp < 7 * 24 * 3600 * 1000) {
            console.log('发现可用缓存包:', info.version);
            return info.path;
        }
        localStorage.removeItem(PACKAGE_CACHE_KEY);
    } catch(e) {
        localStorage.removeItem(PACKAGE_CACHE_KEY);
    }
    return null;
}

function clearPackageCache() {
    localStorage.removeItem(PACKAGE_CACHE_KEY);
    console.log('已清理安装包缓存');
}

// ===== 版本号比较函数 =====
function compareVersion(serverVer, currentVer) {
    const serverParts = serverVer.replace('v', '').split('.');
    const currentParts = currentVer.replace('v', '').split('.');
    for (let i = 0; i < Math.max(serverParts.length, currentParts.length); i++) {
        const sv = parseInt(serverParts[i] || 0);
        const cv = parseInt(currentParts[i] || 0);
        if (sv !== cv) return sv > cv;
    }
    return false;
}

// ===== 获取带防缓存的URL =====
function getNoCacheUrl(url) {
    return url + '?t=' + Date.now() + '&r=' + Math.random();
}

// ===== 热更新核心函数 =====
function attemptHotUpdate(wgtUrl, failKey, onComplete) {
    console.log('尝试热更新...', wgtUrl);
    
    const versionText = document.getElementById('versionText');
    let originalVersionText = '';
    
    if (versionText) {
        originalVersionText = versionText.textContent;
        versionText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 更新中...';
    }
    
    let waiting = null;
    let lastProgress = 0;
    
    const download = plus.downloader.createDownload(wgtUrl, {}, (d, status) => {
        if (waiting) { waiting.close(); waiting = null; }
        
        if (status === 200) {
            const wgtPath = d.filename;
            const currentVersion = localStorage.getItem('app_version') || window.APP_VERSION;
            savePackageInfo(currentVersion, wgtPath);
            
            plus.runtime.install(wgtPath, { force: true }, () => {
                console.log('热更新安装成功');
                if (failKey) localStorage.removeItem(failKey);
                localStorage.setItem('pending_restart', 'true');
                
                if (versionText && originalVersionText) {
                    versionText.textContent = originalVersionText;
                }
                
                if (onComplete) onComplete(true);
            }, (e) => {
                console.error('热更新安装失败:', e);
                localStorage.removeItem('pending_restart');
                clearPackageCache();
                if (versionText && originalVersionText) {
                    versionText.textContent = originalVersionText;
                }
                if (onComplete) onComplete(false);
            });
        } else {
            console.error('热更新下载失败:', status);
            if (versionText && originalVersionText) {
                versionText.textContent = originalVersionText;
            }
            if (onComplete) onComplete(false);
        }
    });
    
    download.addEventListener('statechange', function() {
        if (download.state === 2) {
            const progress = parseInt((download.downloadedSize / download.totalSize) * 100);
            if (!waiting) {
                waiting = plus.nativeUI.showWaiting('下载中 0%', { modal: false });
            }
            waiting.setTitle('下载中 ' + progress + '%');
            
            if (progress - lastProgress >= 10 && versionText) {
                lastProgress = progress;
                versionText.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${progress}%`;
            }
            
            if (progress === 100 && waiting) {
                waiting.close();
                waiting = null;
            }
        }
    });
    
    download.start();
}

// ===== 整包更新弹窗 =====
function showColdUpdateDialog(serverData, apkUrl) {
    const needForce = serverData.forceUpdate === true;
    const updateLog = serverData.notes || '修复问题，优化体验';
    
    const modal = document.createElement('div');
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 20000;
    `;
    
    modal.innerHTML = `
        <div style="background: white; border-radius: 16px; width: 85%; max-width: 320px; padding: 20px; text-align: center;">
            <h3 style="margin: 0 0 8px 0;">发现新版本 ${serverData.version}</h3>
            <p style="margin: 0 0 16px 0; color: #5f6b7a; font-size: 13px;">${updateLog}</p>
            <div style="display: flex; justify-content: center;">
                ${!needForce ? '<button id="cancelUpdateBtn" style="background: #f5f5f5; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer;">暂不更新</button>' : ''}
                <button id="confirmUpdateBtn" style="background: #4CAF50; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer;">立即更新</button>
            </div>
        </div>
    `;
    
    document.body.appendChild(modal);
    
    const cancelBtn = modal.querySelector('#cancelUpdateBtn');
    if (cancelBtn) {
        cancelBtn.onclick = () => { modal.remove(); if (needForce) plus.runtime.quit(); };
    }
    
    modal.querySelector('#confirmUpdateBtn').onclick = () => {
        modal.remove();
        if (apkUrl) {
            plus.runtime.openURL(apkUrl, () => {}, (e) => { alert('打开下载链接失败'); });
        }
    };
}

// ===== 统一更新检测入口 =====
async function checkForUpdate(options = {}) {
    const { silent = false, showManualTip = false } = options;
    
    // 浏览器环境处理
    if (typeof plus === 'undefined') {
        if (showManualTip) showToast('请在 App 内检测更新');
        return { hasUpdate: false };
    }
    
    const versionText = document.getElementById('versionText');
    let originalText = '';
    if (showManualTip && versionText) {
        originalText = versionText.textContent;
        versionText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检测中...';
    }
    
    try {
        const response = await fetch(getNoCacheUrl(VERSION_JSON_URL));
        if (!response.ok) throw new Error('网络错误');
        
        const data = await response.json();
        const cloudVersion = data.version;
        const localVersion = localStorage.getItem('app_version') || window.APP_VERSION;
        
        // 更新显示
        if (versionText) versionText.textContent = `版本: ${cloudVersion}`;
        
        // 同步版本号
        if (localVersion !== cloudVersion) {
            localStorage.setItem('app_version', cloudVersion);
        }
        
        // 版本比较
        const needUpdate = compareVersion(cloudVersion, localVersion);
        
        if (!needUpdate) {
            if (showManualTip) showToast('已是最新版本');
            return { hasUpdate: false };
        }
        
        console.log(`发现新版本: ${localVersion} → ${cloudVersion}`);
        
        // 处理缓存包
        const cachedPath = checkCachedPackage(cloudVersion);
        if (cachedPath) {
            console.log('使用缓存包安装');
            if (!silent) showToast('正在安装已下载的更新...');
            plus.runtime.install(cachedPath, { force: true }, () => {
                localStorage.setItem('pending_restart', 'true');
                if (!silent) showToast('更新已安装，重启后生效');
                clearPackageCache();
            }, (e) => {
                console.error('缓存包安装失败:', e);
                clearPackageCache();
                performUpdate(data, silent);
            });
            return { hasUpdate: true };
        }
        
        // 执行更新
        await performUpdate(data, silent);
        return { hasUpdate: true };
        
    } catch (e) {
        console.error('检测更新失败:', e);
        if (showManualTip) {
            showToast('检测失败，请检查网络');
            if (versionText) versionText.textContent = originalText;
        }
        return { hasUpdate: false, error: e };
    }
}

// ===== 执行更新（根据类型分发）=====
async function performUpdate(versionData, silent = false) {
    let wgtUrl = versionData.wgtUrl;
    let apkUrl = versionData.apkUrl;
    const isHotUpdate = versionData.updateType === 'hot';
    
    if (wgtUrl && !wgtUrl.startsWith('http')) {
        wgtUrl = STATIC_BASE_URL + '/' + wgtUrl.replace(/^\.\//, '');
    }
    if (apkUrl && !apkUrl.startsWith('http')) {
        apkUrl = STATIC_BASE_URL + '/' + apkUrl.replace(/^\.\//, '');
    }
    
    if (isHotUpdate && wgtUrl) {
        if (!silent) showToast('正在后台下载更新...');
        attemptHotUpdate(wgtUrl, 'hot_update_fail_' + versionData.version, (success) => {
            if (success && !silent) showToast('新版本已下载完成，重启后生效');
        });
    } else if (!isHotUpdate && apkUrl) {
        showColdUpdateDialog(versionData, apkUrl);
    } else {
        console.error('无效的更新地址');
    }
}

        const versionDisplay = document.getElementById('versionDisplay');
        if (versionDisplay) {

        window.APP_VERSION = data.version;
    } catch (e) {

        const versionDisplay = document.getElementById('versionDisplay');

    let targetIndex = -1;

            targetIndex = i;
            break;
        }
    }
    
    let highlightedWord = word;
    let highlightedPhonetic = phonetic;
    
    if (targetIndex !== -1 && targetIndex < syllableWordParts.length) {
        // 获取要高亮的字母组合

        // 在单词中高亮这个字母组合

        // 高亮音标中的对应部分
        const targetPhonetic = syllablePhoneticParts[targetIndex];
        const phoneticRegex = new RegExp(`(${targetPhonetic})`, 'g');
        highlightedPhonetic = phonetic.replace(phoneticRegex, `<span style="color: #2196F3; font-weight: bold;">$1</span>`);
    } else {
        // 降级：直接在 phoneticParts 中查找
        for (let i = 0; i < phoneticParts.length; i++) {
            if (phoneticParts[i] === targetSymbol) {
                // 高亮对应的 wordPart

// ===== 判断是否为高峰时段 =====
function isPeakHour() {
    const hour = new Date().getHours();
    return hour >= 19 && hour <= 23;  // 晚上7点到11点
}

// ===== 显示激励视频广告（修复版）=====
function showRewardedVideo(adpid, rewardText = '解锁功能') {
    return new Promise((resolve, reject) => {
        // ===== 1. 检查广告ID是否有效 =====
        if (!adpid || adpid === '' || adpid === '1507000689') {
            console.log('广告ID无效，直接放行');
            showToast('已解锁');
            resolve();
            return;
        }
        
        // ===== 2. 检查是否在 5+App 环境 =====
        if (!window.plus) {
            // 开发环境模拟
            setTimeout(() => {
                if (confirm(`测试模式：模拟看广告完成？\n获得：${rewardText}`)) {
                    resolve();
                } else {
                    reject('测试取消');
                }
            }, 500);
            return;
        }
        
        const isPeak = isPeakHour();
        const mustWatchSeconds = isPeak ? 7 : 0;
        let adReward = null;
        let countdownInterval = null;
        let remainingSeconds = mustWatchSeconds;
        let isAdCompleted = false;
        let adModal = null;
        let hasUserClosed = false;
        let canSkip = false;
        
        // ===== 3. 创建广告弹窗 =====
        adModal = document.createElement('div');
        adModal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            color: white;
        `;
        
        // ===== 4. 关闭按钮（右上角）=====
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '✕';
        closeBtn.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10003;
            display: flex;
            align-items: center;
            justify-content: center;
        `;
        closeBtn.onclick = () => {
            if (hasUserClosed) return;
            hasUserClosed = true;
            if (countdownInterval) clearInterval(countdownInterval);
            if (adReward) try { adReward.destroy(); } catch(e) {}
            if (adModal) adModal.remove();
            reject('用户关闭');
        };
        adModal.appendChild(closeBtn);
        
        // ===== 5. 上滑跳过提示 =====
        const skipHint = document.createElement('div');
        skipHint.innerHTML = mustWatchSeconds > 0 ? `${remainingSeconds}秒后上滑跳过` : '上滑跳过';
        skipHint.style.cssText = `
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            font-size: 14px;
            z-index: 10002;
            transition: all 0.3s;
        `;
        adModal.appendChild(skipHint);
        
        // ===== 6. 奖励提示 =====
        const rewardHint = document.createElement('div');
        rewardHint.innerHTML = `看完视频可获得：${rewardText}`;
        rewardHint.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            font-size: 12px;
            z-index: 10002;
        `;
        adModal.appendChild(rewardHint);
        
        // ===== 7. 加载提示 =====
        const loadingDiv = document.createElement('div');
        loadingDiv.innerHTML = '加载广告中...';
        loadingDiv.style.cssText = 'font-size: 16px; color: #999;';
        adModal.appendChild(loadingDiv);
        
        document.body.appendChild(adModal);
        
        // ===== 8. 倒计时 =====
        if (mustWatchSeconds > 0) {
            countdownInterval = setInterval(() => {
                remainingSeconds--;
                if (remainingSeconds <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    canSkip = true;
                    skipHint.innerHTML = '上滑跳过';
                    skipHint.style.background = 'rgba(76, 175, 80, 0.8)';
                } else {
                    skipHint.innerHTML = `${remainingSeconds}秒后上滑跳过`;
                }
            }, 1000);
        } else {
            canSkip = true;
        }
        
        // ===== 9. 上滑检测 =====
        let touchStartY = 0;
        adModal.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        adModal.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            // 上滑距离超过50px
            if (diff > 50 && canSkip && !hasUserClosed) {
                hasUserClosed = true;
                if (countdownInterval) clearInterval(countdownInterval);
                if (adReward) try { adReward.destroy(); } catch(e) {}
                if (adModal) adModal.remove();
                resolve();
            } else if (diff > 50 && !canSkip && !hasUserClosed) {
                showToast(`${remainingSeconds}秒后才能跳过`);
            }
        });
        
        // ===== 10. 加载广告 =====
        const closeAdModal = () => {
            if (hasUserClosed) return;
            if (countdownInterval) clearInterval(countdownInterval);
            if (adReward) try { adReward.destroy(); } catch(e) {}
            if (adModal) adModal.remove();
        };
        
        try {
            adReward = plus.ad.createRewardedVideoAd({ adpid: adpid });
            
            adReward.onLoad(() => {
                console.log('激励视频加载成功');
                if (loadingDiv) loadingDiv.remove();
                adReward.show();
            });
            
            adReward.onError((err) => {
                console.log('激励视频加载失败:', err);
                // 广告加载失败，直接放行
                if (loadingDiv) loadingDiv.innerHTML = '广告加载失败，自动解锁...';
                setTimeout(() => {
                    if (!hasUserClosed) {
                        hasUserClosed = true;
                        closeAdModal();
                        showToast('已解锁');
                        resolve();
                    }
                }, 1500);
            });
            
            adReward.onClose((data) => {
                if (data && data.isEnded) {
                    isAdCompleted = true;
                    closeAdModal();
                    resolve();
                } else if (!hasUserClosed) {
                    // 未看完，重新播放
                    showToast('请完整观看广告');

        localStorage.setItem('toolbar_notes_all', JSON.stringify(notes));
    },
    
    // ===== 测试存储优化版本 =====
    getExams() {
        try {
            // 先尝试从单个 key 读取（兼容旧数据）
            const legacyData = localStorage.getItem('toolbar_exams_all');
            if (legacyData) {
                console.log('发现旧版测试数据，正在迁移...');
                const exams = JSON.parse(legacyData);
                
                // 迁移到新版分测试存储
                for (const catId in exams) {
                    exams[catId].forEach(exam => {
                        this._saveExamToIndividual(exam);
                    });
                }
                
                // 删除旧数据
                localStorage.removeItem('toolbar_exams_all');
                
                return exams;
            }
            
            // 使用新版分测试存储
            const examIndex = JSON.parse(localStorage.getItem('exam_index') || '{}');
            const exams = {};
            
            for (const catId in examIndex) {
                exams[catId] = [];
                examIndex[catId].forEach(examId => {
                    const exam = this.getExam(examId);
                    if (exam) {
                        exams[catId].push(exam);
                    }
                });
            }
            
            return exams;
        } catch (e) {
            console.error('读取测试失败:', e);
            return { default: [] };
        }
    },
    
    // 获取单个测试
    getExam(examId) {
        try {
            const data = localStorage.getItem(`exam_${examId}`);
            return data ? JSON.parse(data) : null;
        } catch (e) {
            console.error(`读取测试 ${examId} 失败:`, e);
            return null;
        }
    },
    
    // 内部方法：保存单个测试
    _saveExamToIndividual(exam) {
        if (!exam || !exam.id) return;
        
        try {
            // 压缩数据：移除不必要的字段
            const examCopy = { ...exam };
            
            // 如果测试太多，压缩 answerState
            if (examCopy.answerState && exam.questions && exam.questions.length > 100) {
                examCopy.answerState = {
                    answeredQuestions: examCopy.answerState.answeredQuestions || {},
                    disabledUntil: examCopy.answerState.disabledUntil || {},
                    questionStats: examCopy.answerState.questionStats || {}
                };
            }
            
            localStorage.setItem(`exam_${exam.id}`, JSON.stringify(examCopy));
        } catch (e) {
            if (e.name === 'QuotaExceededError') {
                console.warn(`测试 ${exam.id} 过大，尝试进一步压缩`);
                
                // 进一步压缩：移除选项ID
                const examCopy = { ...exam };
                if (examCopy.questions) {
                    examCopy.questions = examCopy.questions.map(q => {
                        if (q.options) {
                            q.options = q.options.map(opt => {
                                delete opt.id;
                                return opt;
                            });
                        }
                        return q;
                    });
                }
                
                localStorage.setItem(`exam_${exam.id}`, JSON.stringify(examCopy));
            } else {
                throw e;
            }
        }
    },
    
    saveExams(exams) {
        try {
            // 更新索引
            const examIndex = {};
            
            for (const catId in exams) {
                examIndex[catId] = [];
                exams[catId].forEach(exam => {
                    if (!exam || !exam.id) return;
                    
                    examIndex[catId].push(exam.id);
                    
                    // 保存单个测试
                    try {
                        this._saveExamToIndividual(exam);
                    } catch (e) {
                        console.error(`保存测试 ${exam.id} 失败:`, e);
                    }
                });
            }
            
            // 保存索引
            localStorage.setItem('exam_index', JSON.stringify(examIndex));
            
            // 清理旧数据
            localStorage.removeItem('toolbar_exams_all');
            
        } catch (e) {
            console.error('保存测试索引失败:', e);
            
            // 降级方案：使用单一存储
            try {
                localStorage.setItem('toolbar_exams_all', JSON.stringify(exams));
            } catch (e2) {
                console.error('降级存储也失败:', e2);
            }
        }
    },
    
    // 添加状态存储方法
    saveState(state) {
        localStorage.setItem('toolbar_notes_state', JSON.stringify(state));
    },
    
    getState() {
        const data = localStorage.getItem('toolbar_notes_state');
        return data ? JSON.parse(data) : null;
    }
};

// ===== 单词数据源标签管理 =====
const WordDataSourceManager = {
    // 缓存标签树结构
    tagTree: null,
    
    // 构建标签树
    buildTagTree() {
        if (!window.globalWords || !Array.isArray(window.globalWords)) {
            return { children: {} };
        }
        
        const root = { children: {} };
        
        window.globalWords.forEach(word => {
            if (!word.tags || !Array.isArray(word.tags)) return;
            
            let currentNode = root;
            word.tags.forEach((tag, index) => {
                if (!currentNode.children[tag]) {
                    currentNode.children[tag] = {
                        name: tag,
                        level: index,
                        children: {},
                        words: []
                    };
                }
                currentNode = currentNode.children[tag];
                
                // 在第三级（叶子节点）添加单词
                if (index === word.tags.length - 1) {
                    currentNode.words.push(word);
                }
            });
        });
        
        return root;
    },
    
    // 获取标签树
    getTagTree() {
        if (!this.tagTree) {
            this.tagTree = this.buildTagTree();
        }
        return this.tagTree;
    },
    
    // 根据选中的标签获取单词
    getWordsBySelectedTags(selectedTags) {
        if (!window.globalWords) return [];
        
        // 如果没有选中任何标签，返回所有单词
        if (selectedTags.size === 0) {
            return window.globalWords;
        }
        
        // 构建选中的标签路径集合
        const selectedPaths = new Set();
        for (const tag of selectedTags) {
            selectedPaths.add(tag);
        }
        
        // 收集单词
        const resultWords = [];
        const processedWords = new Set(); // 用于去重
        
        window.globalWords.forEach(word => {
            if (!word.tags || !Array.isArray(word.tags)) return;
            
            // 检查单词是否匹配选中的标签
            let matched = false;
            
            // 如果选中了某个标签，检查该标签是否在单词的标签路径中
            for (const selectedTag of selectedTags) {
                if (word.tags.includes(selectedTag)) {
                    matched = true;
                    break;
                }
            }
            
            // 额外处理：如果选中了一级标签但没有选中二级标签，则包含该一级标签下的所有单词
            if (!matched && selectedTags.size > 0) {
                for (const selectedTag of selectedTags) {
                    // 检查选中的标签是否是单词标签路径中的前缀
                    if (word.tags.some(tag => tag === selectedTag || tag.startsWith(selectedTag))) {
                        matched = true;
                        break;
                    }
                }
            }
            
            if (matched && !processedWords.has(word.word)) {
                processedWords.add(word.word);
                resultWords.push(word);
            }
        });
        
        return resultWords;
    },
    
    // 清空缓存（当数据更新时调用）
    clearCache() {
        this.tagTree = null;
    }
};

// ===== 滑动换题功能（仅测试模式）=====
initSwipeQuestionNavigation() {
    if (this._swipeHandler) {
        this.removeSwipeQuestionNavigation();
    }
    
    let touchStartX = 0;
    let touchEndX = 0;
    const minSwipeDistance = 50; // 最小滑动距离
    
    this._swipeHandler = (e) => {
        // 只在测试模式下启用
        if (!this.isExamMode || !this.currentExam) return;
        
        const touch = e.touches[0];
        touchStartX = touch.clientX;
    };
    
    this._swipeEndHandler = (e) => {
        // 只在测试模式下启用
        if (!this.isExamMode || !this.currentExam) return;
        if (touchStartX === 0) return;
        
        // 检查滑动开关是否开启
        const swipeEnabled = localStorage.getItem('swipe_question_enabled') !== 'false';
        if (!swipeEnabled) return;
        
        touchEndX = e.changedTouches[0].clientX;
        const swipeDistance = touchEndX - touchStartX;
        
        // 左滑（下一题）
        if (swipeDistance < -minSwipeDistance) {
            console.log('左滑：下一题');
            this.goToNextQuestion();
        }
        // 右滑（上一题）
        else if (swipeDistance > minSwipeDistance) {
            console.log('右滑：上一题');
            this.goToPrevQuestion();
        }
        
        touchStartX = 0;
    };
    
    document.addEventListener('touchstart', this._swipeHandler, { passive: true });
    document.addEventListener('touchend', this._swipeEndHandler, { passive: true });
    
    console.log('滑动换题已初始化');
},

removeSwipeQuestionNavigation() {
    if (this._swipeHandler) {
        document.removeEventListener('touchstart', this._swipeHandler);
        document.removeEventListener('touchend', this._swipeEndHandler);
        this._swipeHandler = null;
        this._swipeEndHandler = null;
    }
},

goToNextQuestion() {
    if (!this.isExamMode || !this.currentExam) return;
    
    const exam = this.currentExam;
    if (this.currentQuestionIndex < exam.questions.length - 1) {
        // 清除当前测试的计时器
        const currentQuestion = exam.questions[this.currentQuestionIndex];
        if (currentQuestion && this._questionTimers) {
            if (this._questionTimers[currentQuestion.id]) {
                clearInterval(this._questionTimers[currentQuestion.id]);
                delete this._questionTimers[currentQuestion.id];
            }
        }
        
        this.currentQuestionIndex++;
        this.renderCurrentQuestion(exam);
        
    } 
},

goToPrevQuestion() {
    if (!this.isExamMode || !this.currentExam) return;
    
    const exam = this.currentExam;
    if (this.currentQuestionIndex > 0) {
        // 清除当前测试的计时器
        const currentQuestion = exam.questions[this.currentQuestionIndex];
        if (currentQuestion && this._questionTimers) {
            if (this._questionTimers[currentQuestion.id]) {
                clearInterval(this._questionTimers[currentQuestion.id]);
                delete this._questionTimers[currentQuestion.id];
            }
        }
        
        this.currentQuestionIndex--;
        this.renderCurrentQuestion(exam);
        
    } 
},


// ===== 预加载技能效果 =====
preloadSkillEffects() {
    // 检查技能效果是否开启
    const skillEnabled = localStorage.getItem('skill_effect_enabled') === 'true';
    if (!skillEnabled) {
        console.log('技能效果未开启，跳过预加载');
        return;
    }
    
    console.log('🎯 预加载技能效果...');
    
    // ===== 1. 预加载音效 =====
    if (typeof this.playSound === 'function') {
        const soundEnabled = localStorage.getItem('global_sound_enabled') !== 'false';
        if (soundEnabled) {
            // 创建隐藏的音频元素进行预加载
            const preloadAudios = ['audio/sd.mp3', 'audio/bz.mp3', 'audio/dui.mp3', 'audio/error.mp3'];
            
            preloadAudios.forEach(src => {
                const audio = new Audio();
                audio.preload = 'auto';
                audio.src = src;
                // 不播放，只是触发预加载
                audio.load();
            });
            console.log('✅ 技能音效预加载完成');
        }
    }
    
    // ===== 2. 预创建技能系统（如果还没有缓存）=====
    if (!this._skillSystemCache) {
        // 获取测试容器
        const examQuestionsList = document.getElementById('examQuestionsList');
        if (!examQuestionsList) {
            console.log('等待测试容器渲染后预加载');
            // 如果没有找到，延迟再试
            setTimeout(() => this.preloadSkillEffects(), 500);
            return;
        }
        
        console.log('创建预加载技能系统实例');
        this._skillSystemContainer = document.createElement('div');
        this._skillSystemContainer.className = 'skill-canvas-container skill-system-cached';
        this._skillSystemContainer.style.cssText = `
            position: absolute;
            pointer-events: none;
            z-index: 99999;
            overflow: visible;
            width: 1px;
            height: 1px;
            opacity: 0;
        `;
        
        // 先添加到容器但不显示
        examQuestionsList.appendChild(this._skillSystemContainer);
        this._skillSystemCache = new LocalSkillSystem(this._skillSystemContainer, this);
        
        console.log('✅ 技能系统预创建完成');
        
        // ===== 3. 创建一些粒子进行预热 =====
        setTimeout(() => {
            if (this._skillSystemCache && examQuestionsList) {
                // 创建少量粒子预热 WebGL
                const warmupX = 10;
                const warmupY = 10;
                
                // 创建一些火焰粒子预热
                const warmupBase = {
                    x: warmupX,
                    y: warmupY,
                    vx: 0,
                    vy: -0.5,
                    size: 5,
                    color: [1.0, 0.5, 0.1, 0.3],
                    life: 20,
                    maxLife: 20,
                    friction: 0.95,
                    gravity: -0.01,
                    spreadX: 5,
                    spreadY: 5,
                    velocitySpread: 0.3
                };
                
                for (let i = 0; i < 10; i++) {
                    this._skillSystemCache.createMultipleParticles(warmupBase, 3);
                }
                
                // 短暂显示后清除
                setTimeout(() => {
                    this._skillSystemCache.clearEffects();
                }, 100);
            }
        }, 200);
    } else {
        console.log('技能系统已存在，无需重复创建');
    }
},

// 重新绑定所有下拉菜单事件（颜色选择器和字体大小）
_rebindDropdownEvents() {
    // 清理旧的事件
    // 颜色选择器
    if (this._boundColorOptions) {
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.removeEventListener('click', this._boundColorOptions);
        });
    }
    if (this._boundCustomColor) {
        document.getElementById('customColorPicker')?.removeEventListener('input', this._boundCustomColor);
    }
    
    // 字体大小
    if (this._boundFontSizeOptions) {
        document.querySelectorAll('.font-size-option').forEach(opt => {
            opt.removeEventListener('click', this._boundFontSizeOptions);
        });
    }
    
    if (this._boundCloseDropdowns) {
        document.removeEventListener('click', this._boundCloseDropdowns);
    }
    

    
    // 重新绑定颜色选项点击处理 - 使用统一的格式应用方法
    this._boundColorOptions = (e) => {
        const color = e.currentTarget.dataset.color;
        this._applyFormatToSelection('foreColor', color);
        
        // 关闭颜色选择器
        const dropdown = document.getElementById('colorPickerDropdown');
        if (dropdown) dropdown.style.display = 'none';
    };
    
    document.querySelectorAll('.color-option').forEach(opt => {
        opt.addEventListener('click', this._boundColorOptions);
    });
    
    // 重新绑定自定义颜色选择
    this._boundCustomColor = (e) => {
        const color = e.target.value;
        this._applyFormatToSelection('foreColor', color);
        
        // 关闭颜色选择器
        const dropdown = document.getElementById('colorPickerDropdown');
        if (dropdown) dropdown.style.display = 'none';
    };
    
    document.getElementById('customColorPicker')?.addEventListener('input', this._boundCustomColor);
    
    // 重新绑定字体大小选项点击处理 - 使用统一的格式应用方法
    this._boundFontSizeOptions = (e) => {
    const size = e.currentTarget.dataset.size;
    this._applyGlobalFontSize(size);
    
    // 关闭字体大小选择器
    const dropdown = document.getElementById('fontSizeDropdown');
    if (dropdown) dropdown.style.display = 'none';
};
    
    document.querySelectorAll('.font-size-option').forEach(opt => {
        opt.addEventListener('click', this._boundFontSizeOptions);
    });
    
    // 重新绑定全局点击关闭所有下拉菜单
    this._boundCloseDropdowns = (e) => {

// 设置自动导出定时器
setupAutoExportTimer() {
    // 清除现有的定时器
    this.clearAutoExportTimer();
    
    // 检查是否开启自动导出
    const autoExportEnabled = localStorage.getItem('auto_export_enabled') === 'true';
    if (!autoExportEnabled) return;
    
    // 读取导出间隔设置（默认30分钟）
    const exportInterval = parseInt(localStorage.getItem('auto_export_interval')) || 30;
    
    // 转换为毫秒
    const intervalMs = exportInterval * 60 * 1000;
    
    // 设置定时器
    this.autoExportTimer = setInterval(() => {
        this.performAutoExport();
    }, intervalMs);
    
    console.log(`✅ 自动备份已开启，间隔 ${exportInterval} 分钟`);
},

// 清除自动导出定时器
clearAutoExportTimer() {
    if (this.autoExportTimer) {
        clearInterval(this.autoExportTimer);
        this.autoExportTimer = null;
    }
},

// 执行自动导出
performAutoExport() {
    // 检查是否有数据变更
    const lastExportTime = localStorage.getItem('last_auto_export_time');
    const now = Date.now();
    
    // 如果上次导出在5分钟内，且没有重大数据变更，可以跳过
    if (lastExportTime && (now - parseInt(lastExportTime)) < 5 * 60 * 1000) {
        // 检查数据是否有变更（可选）
        const dataHash = this.getDataHash();
        const lastHash = localStorage.getItem('last_export_data_hash');
        
        if (dataHash === lastHash) {
            console.log('⏭️ 数据无变化，跳过自动备份');
            return;
        }
    }
    
    // 执行导出
    this.autoExportData();
    
    // 记录导出时间
    localStorage.setItem('last_auto_export_time', now.toString());
    localStorage.setItem('last_export_data_hash', this.getDataHash());
    
    // 清理旧备份
    this.cleanupOldBackups();
},

// 生成数据哈希（简单版本，用于检测数据变化）
getDataHash() {
    const data = {
        categories: this.categories,
        notesCount: Object.values(this.notes).reduce((sum, arr) => sum + arr.length, 0),
        examsCount: Object.values(this.exams).reduce((sum, arr) => sum + arr.length, 0),
        playTime: this.playTime,
        exchangeHistory: this.exchangeHistory,
        totalScore: this.totalScore  // ===== 新增 =====
    };
    return btoa(JSON.stringify(data)).substring(0, 50);
},

// 清理旧备份
cleanupOldBackups() {
    try {
        // 检查 IndexedDB 中是否有旧备份记录
        const backupRecords = JSON.parse(localStorage.getItem('auto_backup_records') || '[]');
        const maxBackups = 10; // 最多保留10个备份
        
        if (backupRecords.length >= maxBackups) {
            // 删除最早的备份
            const toDelete = backupRecords.splice(0, backupRecords.length - maxBackups + 1);
            
            // 这里只是记录，实际文件由用户手动管理
            console.log(`🧹 已清理 ${toDelete.length} 个旧备份记录`);
        }
        
        // 更新记录
        backupRecords.push({
            time: new Date().toISOString(),
            filename: `雷电刷题器_自动备份_${new Date().getFullYear()}${(new Date().getMonth()+1).toString().padStart(2,'0')}${new Date().getDate().toString().padStart(2,'0')}_${new Date().getHours().toString().padStart(2,'0')}${new Date().getMinutes().toString().padStart(2,'0')}${new Date().getSeconds().toString().padStart(2,'0')}.json`
        });
        
        // 只保留最近 maxBackups 条记录
        while (backupRecords.length > maxBackups) {
            backupRecords.shift();
        }
        
        localStorage.setItem('auto_backup_records', JSON.stringify(backupRecords));
        
    } catch (e) {
        console.warn('清理旧备份失败:', e);
    }
},

// 自动导出全局数据（定时调用）- 兼容低端设备

autoExportData() {
    try {
        const data = {
            categories: this.categories,
            notes: this.notes,
            exams: this.exams,
            playTime: this.playTime,
            exchangeHistory: this.exchangeHistory,
            insertedNotesMap: this.insertedNotesMap,
            reverseInsertMap: this.reverseInsertMap,
            totalScore: this.totalScore,  // ===== 新增 =====
            exportTime: new Date().toISOString(),
            version: 'v1.09'
        };
        
        const json = JSON.stringify(data, null, 2);
        
        // ===== 修复：使用更可靠的导出方式 =====
        const fileName = `雷电刷题器_自动备份_${new Date().getFullYear()}${(new Date().getMonth()+1).toString().padStart(2,'0')}${new Date().getDate().toString().padStart(2,'0')}_${new Date().getHours().toString().padStart(2,'0')}${new Date().getMinutes().toString().padStart(2,'0')}${new Date().getSeconds().toString().padStart(2,'0')}.json`;
        
        // 使用 Blob 和 URL.createObjectURL
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.style.display = 'none';
        
        // 必须添加到 DOM 才能触发点击
        document.body.appendChild(a);
        a.click();
        
        // 清理
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 100);
        
        console.log('✅ 自动备份成功:', fileName);
        

    } catch (e) {
        console.error('❌ 自动备份失败:', e);
    }
},

saveAll(skipAttributeUpdate = false) {
    // 确保当前笔记内容是最新的
    if (this.currentNote && !skipAttributeUpdate) {
        const titleInput = document.getElementById('noteTitle');
        const contentDiv = document.getElementById('noteContent');
        if (titleInput && contentDiv) {
            // 先更新内容
            const newTitle = titleInput.value;
            const newContent = contentDiv.innerHTML;
            
            if (this.currentNote.title !== newTitle || this.currentNote.content !== newContent) {
                this.currentNote.title = newTitle;
                this.currentNote.content = newContent;
                this.currentNote.updatedAt = new Date().toISOString();
            }
            
            // 确保字体设置被保存
            const fontSizeBtn = document.getElementById('fontSizeBtn');
            if (fontSizeBtn && fontSizeBtn.dataset.lastFontSize) {
                this.currentNote._globalFontSize = fontSizeBtn.dataset.lastFontSize;
            }
        }
    }
    
    // 保存分类
    Storage.saveCategories(this.categories);
    
    
    // 保存电子书
    localStorage.setItem('toolbar_interactive_books', JSON.stringify(this.interactiveBooks));
    
    // 保存笔记 - 确保 _globalFontSize 被保存
    const notesToSave = {};
    for (const catId in this.notes) {
        notesToSave[catId] = this.notes[catId].map(note => ({
            ...note,
            content: note.content || '',
            _globalFontSize: note._globalFontSize
        }));
    }
    Storage.saveNotes(notesToSave);
    
    // ===== 保存插入笔记映射（确保不会被覆盖）=====
    localStorage.setItem('toolbar_notes_inserts', JSON.stringify(this.insertedNotesMap));
    
    // 保存反向引用映射
    localStorage.setItem('toolbar_notes_reverse', JSON.stringify(this.reverseInsertMap));

    // 保存玩耍时间对象
    localStorage.setItem('toolbar_play_time', JSON.stringify(this.playTime));
    
    // 保存兑换记录
    localStorage.setItem('toolbar_exchange_history', JSON.stringify(this.exchangeHistory));
    
    console.log('数据已保存');
    console.log('保存的插入映射:', this.insertedNotesMap);
},

                    if (e.target.closest('.more-btn')) return;
                    const noteId = noteCard.dataset.id;
                    const note = this._currentNotes.find(n => n.id === noteId);
                    if (note) {
                        this.openNote(note);
                    }
                    return;
                }
                
                // 处理测试卡片
                const examCard = e.target.closest('.exam-card');
                if (examCard) {
                    if (e.target.closest('.exam-more-btn')) return;
                    const examId = examCard.dataset.examId;
                    const exam = exams.find(e => e.id === examId);
                    if (exam && exam.questions !== undefined) {
                        this.openExam(exam);
                    }
                    return;
                }
                
                // 处理电子书卡片
                const bookCard = e.target.closest('.interactive-book-card');
                if (bookCard) {
                    if (e.target.closest('.book-more-btn')) return;
                    const bookId = bookCard.dataset.bookId;
                    const book = interactiveBooks.find(b => b.id === bookId);
                    if (book) {
                        this.openInteractiveBook(book);
                    }
                    return;
                }
            };
            
            notesGrid.addEventListener('click', this._notesGridClickHandler);
        }
    }, 100);
    
    // 全局点击隐藏下拉菜单
    document.addEventListener('click', () => {
        this.hideDropdown();
    });
},

// 更新工具栏得分显示（剩余可兑换分数 = 总得分 - 已兑换时间）
updateToolbarScore() {
    const toolbarScoreSpan = document.getElementById('toolbarScoreValue');
    if (!toolbarScoreSpan) return;
    
    // 计算已兑换的总时间
    let totalPlayTime = 0;
    for (const examId in this.playTime) {
        totalPlayTime += this.playTime[examId] || 0;
    }
    
    // 剩余分数 = 全局总得分 - 已兑换时间
    const remainingScore = this.totalScore - totalPlayTime;
    toolbarScoreSpan.textContent = remainingScore >= 0 ? remainingScore : 0;
},
updateTotalScoreDisplay(exam) {
    // 更新当前测试的得分显示（如果存在）
    const scoreDisplay = document.getElementById('totalScoreDisplay');
    if (scoreDisplay) {
        const scoreSpan = scoreDisplay.querySelector('span');
        if (scoreSpan) {
            const examPlayTime = this.playTime[exam.id] || 0;
            const remainingScore = (exam.totalScore || 0) - examPlayTime;
            scoreSpan.textContent = `${remainingScore} 分`;
        }
    }
    
    // ===== 更新全局工具栏得分 =====
    this.updateToolbarScore();
    
    // 保存到 Storage
    Storage.saveExams(this.exams);
},

//打开测试

openExam(exam) {
    console.log('打开测试:', exam.id);
    // ===== 隐藏顶部标题 =====
    const pageTitle = document.getElementById('pageTitle');
    if (pageTitle) {
        pageTitle.style.display = 'none';
    }
    // ===== 修改：保存返回信息后再关闭 =====
    // 如果有当前笔记，先保存返回信息
    if (this.currentNote) {
        // 保存返回信息到 localStorage
        const returnInfo = {
            noteId: this.currentNote.id,
            categoryId: this.currentCategory?.id,
            title: this.currentNote.title,
            content: this.currentNote.content,
            updatedAt: this.currentNote.updatedAt
        };
        localStorage.setItem('temp_return_note_info', JSON.stringify(returnInfo));
        console.log('在 openExam 中保存返回信息:', returnInfo);
    }
    
    // 如果有当前笔记或测试，先关闭
    if (this.currentNote || this.currentExam) {
        this.closeNoteAndReturn();
    }
    
    this.isExamMode = true;
    this.currentExam = exam;
    this.currentExamId = exam.id;
    
    this.currentQuestionIndex = 0;
    
    // ===== 重新加载兑换记录 =====
    const savedHistory = localStorage.getItem('toolbar_exchange_history');
    this.exchangeHistory = savedHistory ? JSON.parse(savedHistory) : [];
    
    // ===== 初始化当前测试的玩耍时间 =====
    if (!this.playTime[exam.id]) {
        this.playTime[exam.id] = 0;
    }
    
    // ===== 打开测试时对测试进行排序 =====
    this.sortExamQuestions(exam);
    
    // ===== 打开测试时，只对未答过的测试重新随机 =====
    if (exam.questions && exam.questions.length > 0) {
        exam.questions.forEach(question => {
            // 为每个测试生成唯一ID（如果没有的话）
            if (!question.id) {
                question.id = 'q_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            }
            
            // 检查测试是否已经答过
            const isAnswered = exam.answerState?.answeredQuestions?.[question.id];
            
            // 如果是已答过的测试，绝对不能重新随机！
            if (isAnswered) {
                console.log(`测试 ${question.id} 已答过，保持原有选项顺序`);
                // 确保 shuffledOptions 存在
                if (!question.shuffledOptions) {
                    question.shuffledOptions = this.shuffleArray([...question.options]);
                }
            } else {
                // ===== 修改：未答过的测试，根据测试类型处理 =====
                // 检查是否是拼读测试
                if (question.correctWordInfo && question.correctWordInfo.wordaudio) {
                    console.log('📝 这是拼读测试，保持原有选项');
                    // 只确保有 shuffledOptions，不重新随机
                    if (!question.shuffledOptions) {
                        question.shuffledOptions = this.shuffleArray([...question.options]);
                    }
                }
                // 检查是否是音节划分测试
                else if (question.correctWordInfo && question.correctWordInfo.syllableCount !== undefined) {
                    console.log('📝 这是音节划分测试，保持原有选项');
                    // 只确保有 shuffledOptions，不重新随机
                    if (!question.shuffledOptions) {
                        question.shuffledOptions = this.shuffleArray([...question.options]);
                    }
                }
                // 图片题
                else if (question.correctImageNum) {
                    this.randomizeQuestionOptions(question);
                }
                // 音频题
                else if (this.isAudioQuestion(question)) {
                    this.randomizeAudioQuestionOptions(question);
                }
                // 其他测试
                else {
                    // 确保有 shuffledOptions
                    if (!question.shuffledOptions) {
                        question.shuffledOptions = this.shuffleArray([...question.options]);
                    }
                }
            }
        });

        // ===== 打开测试时预检查最后一题状态 =====
        this.preCheckLastQuestionState(exam, exam.questions.length - 1);
    }
    
    // ===== 在渲染前预处理所有测试的状态，确保显示正确 =====
    this.preprocessExamQuestionsState(exam);
    
    // 渲染测试编辑器
    this.renderExamEditor(exam);
    
    this.updateToolbarScore();
    
    // ===== 修复：显示得分按钮（使用正确的ID和样式）=====
    const toolbarScore = document.getElementById('toolbarScoreDisplay');
    if (toolbarScore) {
        toolbarScore.style.display = 'inline-flex';
    }
    
    // 显示其他按钮
    document.getElementById('importBtn').style.display = 'flex';
    document.getElementById('newNoteContainer').style.display = 'none';
    document.getElementById('noteToolbar').style.display = 'flex';

    // 测试模式：隐藏不需要的按钮
    document.getElementById('boldBtn').style.display = 'none';
    document.getElementById('colorPickerBtn').style.display = 'none';
    document.getElementById('fontSizeBtn').style.display = 'none';
    document.getElementById('insertNoteBtn').style.display = 'none';
    document.getElementById('undoBtn').style.display = 'none';
    document.getElementById('redoBtn').style.display = 'none';
    
    this.saveState();

    // 启动可见性检测计时器
    this.startVisibilityTimer();
    
    // ===== 预加载技能效果 =====
    setTimeout(() => {
        this.preloadSkillEffects();
    }, 100);
},

// 显示书本目录
showBookTOC() {
    const container = document.getElementById('bookContentContainer');
    const tocDiv = container?.querySelector('.book-toc');
    const phoneticDiv = document.getElementById('bookPhoneticContainer');
    
    // 使用 requestAnimationFrame 确保在渲染前设置滚动位置
    if (this._savedTOCScrollTop !== undefined && container) {
        requestAnimationFrame(() => {
            container.scrollTop = this._savedTOCScrollTop;
        });
    }
    
    if (tocDiv) tocDiv.style.display = 'block';
    if (phoneticDiv) phoneticDiv.style.display = 'none';
},

// 显示音标详情页 - 添加返回目录按钮

    // 进入详情页前，保存目录的滚动位置
    const tocContainer = document.getElementById('bookContentContainer');
    if (tocContainer) {
        this._savedTOCScrollTop = tocContainer.scrollTop;
    }
    


    const bookData = this._currentBookData;
    if (!bookData) return;
    
    // 查找音标数据
    let phoneticItem = null;
    let chapterInfo = null;
    
    for (const chapter of bookData.tableOfContents) {
        for (const section of chapter.sections) {
            const found = section.items.find(item => item.symbol === symbol);
            if (found) {
                phoneticItem = found;
                chapterInfo = { chapter: chapter.name, section: section.name };

// 渲染测试编辑器

renderExamEditor(exam) {
    const area = document.getElementById('contentArea');
    
    // 计算统计
    const now = Date.now();
    let cooldownCount = 0;
    let completedCount = 0;
    
    if (exam.questions && exam.questions.length > 0) {
        exam.questions.forEach(question => {
            const answered = exam.answerState?.answeredQuestions?.[question.id];
            const disabledUntil = exam.answerState?.disabledUntil?.[question.id];
            const questionStat = exam.answerState?.questionStats?.[question.id];
            const correctCount = questionStat?.correctCount || 0;
            
            if (answered && answered.isCorrect) {
                if (disabledUntil && disabledUntil > now) {
                    cooldownCount++;
                } else if (correctCount >= 7) {
                    completedCount++;
                }

            question.shuffledOptions = this.shuffleArray([...question.options]);

// 预检查下一题状态
preCheckNextQuestionState(exam, nextIndex) {
    if (!exam || !exam.questions || nextIndex >= exam.questions.length) return;
    
    // 确保 answerState 存在
    if (!exam.answerState) {
        exam.answerState = {
            answeredQuestions: {},
            disabledUntil: {},
            questionStats: {}
        };
    }
    
    // 确保子属性存在
    if (!exam.answerState.answeredQuestions) exam.answerState.answeredQuestions = {};
    if (!exam.answerState.disabledUntil) exam.answerState.disabledUntil = {};
    if (!exam.answerState.questionStats) exam.answerState.questionStats = {};
    
    const nextQuestion = exam.questions[nextIndex];
    if (!nextQuestion) return;
    
    // 确保下一题有shuffledOptions
    if (!nextQuestion.shuffledOptions) {
        nextQuestion.shuffledOptions = this.shuffleArray([...nextQuestion.options]);
    }
    
    // 检查下一题的状态，但不渲染
    const answered = exam.answerState.answeredQuestions[nextQuestion.id];
    const disabledUntil = exam.answerState.disabledUntil[nextQuestion.id];
    const now = Date.now();
    
    // 如果下一题有倒计时且已结束，提前清除状态
    if (disabledUntil && disabledUntil <= now) {
        console.log('⏰ 下一题倒计时已结束，提前清除状态');
        delete exam.answerState.disabledUntil[nextQuestion.id];
        
        // 根据测试状态决定是否重新随机
        if (answered) {
            if (answered.isCorrect) {
                // 答对的测试：保留原有选项顺序
                console.log('✅ 下一题答对倒计时结束，保留选项顺序');
                delete exam.answerState.answeredQuestions[nextQuestion.id];
            } else {
                // 答错的测试：可以重新随机
                console.log('🔄 下一题答错倒计时结束，重新随机选项顺序');
                delete exam.answerState.answeredQuestions[nextQuestion.id];
                nextQuestion.shuffledOptions = this.shuffleArray([...nextQuestion.options]);
            }
        } else {
            // 无测试记录：重新随机
            nextQuestion.shuffledOptions = this.shuffleArray([...nextQuestion.options]);
        }
    }
    
    // 如果下一题是答错的且倒计时已结束，提前清除状态（这个判断和上面的有重叠，但保留以确保完整性）
    if (answered && !answered.isCorrect && disabledUntil && disabledUntil <= now) {
        console.log('⏰ 下一题答错倒计时已结束，提前清除状态');
        delete exam.answerState.answeredQuestions[nextQuestion.id];
        delete exam.answerState.disabledUntil[nextQuestion.id];
        nextQuestion.shuffledOptions = this.shuffleArray([...nextQuestion.options]);
    }
},

// ===== 预处理测试测试状态，避免闪烁 =====
preprocessExamQuestionsState(exam) {
    if (!exam || !exam.questions) return;
    
    const now = Date.now();
    
    exam.questions.forEach(question => {
        if (!question.id) return;
        
        const answered = exam.answerState?.answeredQuestions?.[question.id];
        const disabledUntil = exam.answerState?.disabledUntil?.[question.id];
        
        // 如果倒计时已过期，清除状态
        if (disabledUntil && disabledUntil <= now) {
            console.log(`预处理：测试 ${question.id.substring(0, 8)} 倒计时已过期，清除状态`);
            
            // 清除禁用状态
            if (exam.answerState && exam.answerState.disabledUntil) {
                delete exam.answerState.disabledUntil[question.id];
            }
            
            // 清除测试记录
            if (exam.answerState && exam.answerState.answeredQuestions) {
                delete exam.answerState.answeredQuestions[question.id];
            }
            
            // 重新随机选项
            question.shuffledOptions = this.shuffleArray([...question.options]);
        }
        
        // 确保有 shuffledOptions
        if (!question.shuffledOptions) {
            question.shuffledOptions = this.shuffleArray([...question.options]);
        }
    });
    
    // 保存状态
    if (exam.answerState) {
        exam.updatedAt = new Date().toISOString();
        Storage.saveExams(this.exams);
    }
},
// 预检查最后一题状态（用于最后一题按钮）
preCheckLastQuestionState(exam, lastIndex) {
    if (!exam || !exam.questions || lastIndex < 0 || lastIndex >= exam.questions.length) return;
    
    // 确保 answerState 存在
    if (!exam.answerState) {
        exam.answerState = {
            answeredQuestions: {},
            disabledUntil: {},
            questionStats: {}
        };
    }
    
    // 确保子属性存在
    if (!exam.answerState.answeredQuestions) exam.answerState.answeredQuestions = {};
    if (!exam.answerState.disabledUntil) exam.answerState.disabledUntil = {};
    if (!exam.answerState.questionStats) exam.answerState.questionStats = {};
    
    const lastQuestion = exam.questions[lastIndex];
    if (!lastQuestion) return;
    
    // 确保最后一题有shuffledOptions
    if (!lastQuestion.shuffledOptions) {
        lastQuestion.shuffledOptions = this.shuffleArray([...lastQuestion.options]);
    }
    
    // 检查最后一题的状态
    const answered = exam.answerState.answeredQuestions[lastQuestion.id];
    const disabledUntil = exam.answerState.disabledUntil[lastQuestion.id];
    const now = Date.now();
    
    // 如果最后一题有倒计时且已结束，提前清除状态
    if (disabledUntil && disabledUntil <= now) {
        console.log('⏰ 最后一题倒计时已结束，提前清除状态');
        delete exam.answerState.disabledUntil[lastQuestion.id];
        
        // 根据测试状态决定是否重新随机
        if (answered) {
            if (answered.isCorrect) {
                // 答对的测试：保留原有选项顺序
                console.log('✅ 最后一题答对倒计时结束，保留选项顺序');
                delete exam.answerState.answeredQuestions[lastQuestion.id];
            } else {
                // 答错的测试：可以重新随机
                console.log('🔄 最后一题答错倒计时结束，重新随机选项顺序');
                delete exam.answerState.answeredQuestions[lastQuestion.id];
                lastQuestion.shuffledOptions = this.shuffleArray([...lastQuestion.options]);
            }
        } else {
            // 无测试记录：重新随机
            lastQuestion.shuffledOptions = this.shuffleArray([...lastQuestion.options]);
        }
    }
    
    // 如果最后一题是答错的且倒计时已结束，提前清除状态
    if (answered && !answered.isCorrect && disabledUntil && disabledUntil <= now) {

        delete exam.answerState.answeredQuestions[lastQuestion.id];
        delete exam.answerState.disabledUntil[lastQuestion.id];
        lastQuestion.shuffledOptions = this.shuffleArray([...lastQuestion.options]);
    }
},


// 更新可见区域内的倒计时
updateVisibleTimers() {
    if (!this.isExamMode || !this.currentExam) return;
    
    const exam = this.currentExam;
    
    // 确保 answerState 存在
    if (!exam.answerState) {
        exam.answerState = {
            answeredQuestions: {},
            disabledUntil: {},
            questionStats: {}
        };
    }
    
    // 确保子属性存在
    if (!exam.answerState.answeredQuestions) exam.answerState.answeredQuestions = {};
    if (!exam.answerState.disabledUntil) exam.answerState.disabledUntil = {};
    if (!exam.answerState.questionStats) exam.answerState.questionStats = {};
    
    const now = Date.now();
    let needsUpdate = false;
    const questionsToUpdate = [];
    
    // 遍历所有测试，检查倒计时是否结束（简化版，不检查可视区域）
    exam.questions.forEach(question => {
        if (!question || !question.id) return;
        
        const questionId = question.id;
        const answered = exam.answerState.answeredQuestions[questionId];
        const disabledUntil = exam.answerState.disabledUntil[questionId];
        
        // 检查倒计时是否结束
        if (disabledUntil && disabledUntil <= now) {
            // 清除禁用状态
            delete exam.answerState.disabledUntil[questionId];
            
            // 清除测试记录（倒计时结束后测试重置）
            if (exam.answerState.answeredQuestions[questionId]) {
                delete exam.answerState.answeredQuestions[questionId];
            }
            
            // 重新随机排序该测试的选项
            if (question.shuffledOptions) {
                delete question.shuffledOptions;
            }
            question.shuffledOptions = this.shuffleArray([...question.options]);
            
            needsUpdate = true;
            questionsToUpdate.push(questionId);
        }
    });
    
    // 预检查下一题状态
    if (this.currentQuestionIndex < exam.questions.length - 1) {
        this.preCheckNextQuestionState(exam, this.currentQuestionIndex + 1);
    }
    
    // 预检查最后一题状态（如果最后一题不是当前题）
    if (this.currentQuestionIndex < exam.questions.length - 1 && exam.questions.length > 0) {
        const lastIndex = exam.questions.length - 1;
        if (lastIndex !== this.currentQuestionIndex && lastIndex !== this.currentQuestionIndex + 1) {
            this.preCheckLastQuestionState(exam, lastIndex);
        }
    }
    
    // 更新所有需要更新的测试
    if (needsUpdate) {
        exam.updatedAt = new Date().toISOString();
        Storage.saveExams(this.exams);
        
        questionsToUpdate.forEach(questionId => {
            this.updateQuestionDisplay(questionId, exam);
        });
    }
},


// 随机化测试的干扰图片（每次打开测试时重新选择不同的干扰项）
randomizeQuestionOptions(question) {
    // ===== 检查测试是否已答过 =====
    if (this.currentExam && this.currentExam.answerState) {
        const isAnswered = this.currentExam.answerState.answeredQuestions?.[question.id];
        if (isAnswered) {
            console.log('⚠️ 尝试随机已答过的图片测试，已阻止');
            return;
        }
    }
    
    if (!question.correctImageNum) return;
    
    
    
    console.log('重新随机干扰项，正确图片:', question.correctImageNum);
    
    // 生成3个不同的随机干扰项（1-48，不包括正确图片）
    const distractors = [];
    while (distractors.length < 3) {
        const num = Math.floor(Math.random() * 48) + 1; // 1-48

// 显示兑换记录（全局）
showExchangeHistory(event) {
    if (event) {
        event.stopPropagation();
    }
    
    // 筛选所有记录，按时间排序
    const allRecords = [...this.exchangeHistory].sort((a, b) => b.timestamp - a.timestamp);
    
    // 按日期分组
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const todayRecords = [];
    const earlierRecords = [];
    
    allRecords.forEach(record => {
        const recordDate = new Date(record.timestamp);
        recordDate.setHours(0, 0, 0, 0);
        
        if (recordDate.getTime() === today.getTime()) {
            todayRecords.push(record);
        } else {
            earlierRecords.push(record);
        }
    });
    
    // 生成记录HTML
    let recordsHtml = '';
    
    // 今天记录
    if (todayRecords.length > 0) {
        recordsHtml += `<div style="font-size: 12px; color: #999; margin: 8px 0 4px 0;">今天</div>`;
        todayRecords.slice(0, 30).forEach(record => {

    const icon = document.getElementById(iconId);

        console.log('音频元素未找到:', audioId);
        return;

        console.log('图标元素未找到:', iconId);
        return;
    }

        this.currentPlayingAudio.pause();
        this.currentPlayingAudio.currentTime = 0;
        
        // 清除前一个图标的动画
        if (this.currentPlayingIcon) {
            const prevBars = this.currentPlayingIcon.children;
            for (let bar of prevBars) {
                
                bar.style.animation = 'none';
                bar.style.animationDelay = '0s';
            }
        }
