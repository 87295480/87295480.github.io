// 排序测试测试
// 排序测试测试
// 排序测试测试
sortExamQuestions(exam) {
    if (!exam || !exam.questions || exam.questions.length === 0) return;
    
    const now = Date.now();
    
    // 为每个测试计算排序优先级
    const questionsWithPriority = exam.questions.map(question => {
        // ===== 添加空值保护 =====
        if (!question || !question.id) {
            console.warn('跳过无效测试:', question);
            return null;
        }
        
        const answered = exam.answerState?.answeredQuestions[question.id];
        const disabledUntil = exam.answerState?.disabledUntil[question.id];
        const questionStat = exam.answerState?.questionStats?.[question.id];
        const correctCount = questionStat?.correctCount || 0;
        
        let priority = 0;
        let status = 'unknown';
        
        if (!answered) {
            priority = 0;
            status = '未做';
        } else if (!answered.isCorrect) {
            priority = 0;
            status = '做错';
        } else if (answered.isCorrect) {
            if (disabledUntil && disabledUntil > now) {
                priority = 1;
                status = '倒计时中';
            } else if (correctCount < 7) {
                priority = 0;
                status = '待复习';
            } else {
                priority = 2;
                status = '已完成';
            }
        }
        
        return {
            question,
            priority,
            status,
            disabledUntil: disabledUntil || 0,
            correctCount: correctCount
        };
    }).filter(item => item !== null);  // ===== 过滤掉无效测试 =====
    
    // 如果没有有效测试，直接返回
    if (questionsWithPriority.length === 0) {
        console.warn('没有有效测试可排序');
        return;
    }
    
    // 按优先级排序
    questionsWithPriority.sort((a, b) => {
        if (a.priority !== b.priority) {
            return a.priority - b.priority;
        }
        
        if (a.priority === 0 && b.priority === 0) {
            const statusOrder = {
                '待复习': 0,
                '未做': 1,
                '做错': 2
            };
            const aStatus = a.status;
            const bStatus = b.status;
            
            if (statusOrder[aStatus] !== statusOrder[bStatus]) {
                return statusOrder[aStatus] - statusOrder[bStatus];
            }
            
            if (a.status === '待复习' && b.status === '待复习') {
                return b.correctCount - a.correctCount;
            }
        }
        
        if (a.priority === 1 && b.priority === 1) {
            const aRemaining = a.disabledUntil - now;
            const bRemaining = b.disabledUntil - now;
            return aRemaining - bRemaining;
        }
        
        return 0;
    });
    
    // 更新测试顺序
    exam.questions = questionsWithPriority.map(item => item.question);
    exam.updatedAt = new Date().toISOString();
    
    // ===== 添加调试日志，避免在 question 为 undefined 时报错 =====
    console.log('测试测试已排序', questionsWithPriority.map(q => ({
        测试: q.question?.question ? q.question.question.substring(0, 20) : '无效测试',
        状态: q.status,
        优先级: q.priority,
        答对次数: q.correctCount
    })));
},

// 随机化音频测试的选项
// 随机化音频测试的选项
randomizeAudioQuestionOptions(question) {
    // ===== 检查是否是拼读测试，如果是则跳过 =====
    if (question.correctWordInfo && question.correctWordInfo.wordaudio) {
        console.log('⚠️ 这是拼读测试，跳过音频随机化');
        // 确保有shuffledOptions
        if (!question.shuffledOptions) {
            question.shuffledOptions = this.shuffleArray([...question.options]);
        }
        return;
    }
    
    // ===== 检查是否是音节划分测试，如果是则跳过 =====
    if (question.correctWordInfo && question.correctWordInfo.syllableCount !== undefined) {
        console.log('⚠️ 这是音节划分测试，跳过音频随机化');
        // 确保有shuffledOptions
        if (!question.shuffledOptions) {
            question.shuffledOptions = this.shuffleArray([...question.options]);
        }
        return;
    }
    
    // ===== 检查测试是否已答过 =====
    if (this.currentExam && this.currentExam.answerState) {
        const isAnswered = this.currentExam.answerState.answeredQuestions?.[question.id];
        if (isAnswered) {
            console.log('⚠️ 尝试随机已答过的音频测试，已阻止');
            return;
        }
    }
    
    // 原有的音频随机化代码...
    if (!question.options || question.options.length === 0) return;
    
    console.log('重新随机音频测试选项，测试:', question.question);
    
    // 找出正确选项
    const correctOption = question.options.find(opt => opt.isCorrect === true);
    if (!correctOption || !correctOption.audio) {
        console.log('未找到正确音频选项');
        return;
    }
    
    // 从音频路径中提取编号，如 "audio/standard/audioa35.mp3" -> 35
    const match = correctOption.audio.match(/audioa(\d+)\.mp3/);
    if (!match) {
        console.log('无法从音频路径提取编号');
        return;
    }
    
    const correctAudioNum = parseInt(match[1]);
    console.log('正确音频编号:', correctAudioNum);
    
    // 生成3个不同的随机干扰项（1-48，不包括正确音频）
    const distractors = [];
    while (distractors.length < 3) {
        const num = Math.floor(Math.random() * 48) + 1; // 1-48
        // 不能是正确音频，也不能重复
        if (num !== correctAudioNum && !distractors.includes(num)) {
            distractors.push(num);
        }
    }
    
    console.log('新干扰项:', distractors);
    
    // 创建新选项
    const newOptions = [
        { 
            audio: `audio/standard/audioa${correctAudioNum}.mp3`, 
            isCorrect: true,
            text: correctOption.text || '' // 保留原有的文本（如果有）
        },
        { 
            audio: `audio/standard/audioa${distractors[0]}.mp3`, 
            isCorrect: false,
            text: this.getOptionTextByAudioNum(distractors[0])
        },
        { 
            audio: `audio/standard/audioa${distractors[1]}.mp3`, 
            isCorrect: false,
            text: this.getOptionTextByAudioNum(distractors[1])
        },
        { 
            audio: `audio/standard/audioa${distractors[2]}.mp3`, 
            isCorrect: false,
            text: this.getOptionTextByAudioNum(distractors[2])
        }
    ];
    
    // 为每个选项生成ID
    newOptions.forEach((opt, idx) => {
        opt.id = 'opt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '_' + idx;
    });
    
    // 随机打乱选项顺序
    const shuffledOptions = this.shuffleArray(newOptions);
    
    // 更新测试选项
    question.options = newOptions;  // 更新原始选项
    question.shuffledOptions = shuffledOptions;  // 保存随机顺序
    
    console.log('音频测试随机化完成，新选项:', newOptions.map(o => o.audio));
},

// 随机排序数组
shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
},

// ===== 辅助方法，将内容中的音频路径转换为播放器 =====
convertAudioPathsToPlayers(container) {
    if (!container) return;
    
    // 查找所有文本节点，寻找音频路径
    const walker = document.createTreeWalker(
        container,
        NodeFilter.SHOW_TEXT,
        {
            acceptNode: function(node) {
                // 跳过已经处理过的节点
                if (node.parentNode && node.parentNode.classList && 
                    (node.parentNode.classList.contains('audio-player') || 
                     node.parentNode.classList.contains('audio-icon-container'))) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        }
    );
    
    const textNodes = [];
    let node;
    while (node = walker.nextNode()) {
        textNodes.push(node);
    }
    
    // 音频路径的正则表达式
    const audioRegex = /(audio\/[^\s<>"']+\.mp3)/g;
    
    textNodes.forEach(textNode => {
        const text = textNode.textContent;
        let match;
        let lastIndex = 0;
        const fragment = document.createDocumentFragment();
        
        while ((match = audioRegex.exec(text)) !== null) {
            const audioPath = match[1];
            
            // 添加匹配前的文本
            if (match.index > lastIndex) {
                fragment.appendChild(document.createTextNode(
                    text.substring(lastIndex, match.index)
                ));
            }
            
            // 生成唯一ID
            const audioPlayerId = 'hint_audio_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '_' + Math.random().toString(36).substr(2, 4);
            const iconId = 'hint_icon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '_' + Math.random().toString(36).substr(2, 4);
            
            // 创建音频播放器
            const playerSpan = document.createElement('span');
            playerSpan.className = 'audio-player';
            playerSpan.innerHTML = `
                <audio id="${audioPlayerId}" src="${audioPath}" preload="none"></audio>
                <span class="audio-icon-container" style="display: inline-flex; align-items: center; cursor: pointer; padding: 2px; border-radius: 4px; margin: 0 2px; vertical-align: middle;" 
                      onclick="event.stopPropagation(); App.playAudio('${audioPlayerId}', '${iconId}'); return false;">
                    <span id="${iconId}" style="display: inline-flex; align-items: center;">
                        <span style="width: 2px; height: 5px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                        <span style="width: 2px; height: 10px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                        <span style="width: 2px; height: 7px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                        <span style="width: 2px; height: 14px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                        <span style="width: 2px; height: 6px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                        <span style="width: 2px; height: 10px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                        <span style="width: 2px; height: 5px; background: #2196F3; border-radius: 1px; margin-right: 2px;"></span>
                    </span>
                </span>
            `;
            
            fragment.appendChild(playerSpan);
            lastIndex = match.index + audioPath.length;
        }
        
        // 添加剩余的文本
        if (lastIndex < text.length) {
            fragment.appendChild(document.createTextNode(text.substring(lastIndex)));
        }
        
        // 如果有替换，替换原文本节点
        if (fragment.childNodes.length > 0) {
            textNode.parentNode.replaceChild(fragment, textNode);
        }
    });
},

// 新增辅助方法：检查单个测试的计时器
checkQuestionTimer(question, exam, now, questionsToUpdate, needsUpdate) {
    if (!question) return needsUpdate;
    
    const questionId = question.id;
    const answered = exam.answerState.answeredQuestions[questionId];
    const disabledUntil = exam.answerState.disabledUntil[questionId];
    
    // 检查倒计时是否结束
    if (disabledUntil && disabledUntil <= now) {
        console.log(`测试 ${questionId.substring(0, 8)} 倒计时结束，清除禁用状态`);
        
        // 清除禁用状态
        delete exam.answerState.disabledUntil[questionId];
        
        // 清除测试记录
        delete exam.answerState.answeredQuestions[questionId];
        
        // 重新随机选项
        question.shuffledOptions = this.shuffleArray([...question.options]);
        
        questionsToUpdate.push(questionId);
        return true;
    }
    
    return needsUpdate;

// 更新测试计数显示
updateQuestionCountDisplay(exam) {
    if (!exam) return;
    
    const now = Date.now();
    let cooldownCount = 0;
    let completedCount = 0;
    
    // 遍历所有测试统计状态
    exam.questions.forEach(question => {
        const questionId = question.id;
        const answered = exam.answerState?.answeredQuestions?.[questionId];
        const disabledUntil = exam.answerState?.disabledUntil?.[questionId];
        const questionStat = exam.answerState?.questionStats?.[questionId];
        const correctCount = questionStat?.correctCount || 0;
        
        if (answered && answered.isCorrect) {
            if (disabledUntil && disabledUntil > now) {
                cooldownCount++;
            } else if (correctCount >= 7) {
                completedCount++;
            }
        }
    });
    
    // 计算记忆总数 = 倒计时中 + 已完成
    const memoryTotal = cooldownCount + completedCount;
    
    // 添加调试输出
    console.log('🔄 更新测试计数:', {
        时间: new Date().toLocaleTimeString(),
        总题数: exam.questions?.length || 0,
        倒计时中: cooldownCount,
        已完成: completedCount,
        记忆总数: memoryTotal,
        未做或做错: (exam.questions?.length || 0) - memoryTotal
    });
    
    const questionCountSpan = document.querySelector('#manageQuestionsBtn span');
    if (questionCountSpan) {
        questionCountSpan.textContent = `${exam.questions?.length || 0}/${memoryTotal} 题`;
    }
},

debugExamStatus(exam) {
    if (!exam) return;
    
    const now = Date.now();
    const stats = {
        总题数: exam.questions?.length || 0,
        倒计时中: 0,
        已完成: 0,
        未做: 0,
        做错: 0,
        待复习: 0, // 答对但未满7次且无倒计时
        测试详情: []
    };
    
    exam.questions.forEach((question, index) => {
        const answered = exam.answerState?.answeredQuestions?.[question.id];
        const disabledUntil = exam.answerState?.disabledUntil?.[question.id];
        const questionStat = exam.answerState?.questionStats?.[question.id];
        const correctCount = questionStat?.correctCount || 0;
        
        let status = '';
        let statusCode = '';
        
        if (!answered) {
            status = '❌ 未做';
            statusCode = '未做';
            stats.未做++;
        } else if (!answered.isCorrect) {
            status = '❌ 做错';
            statusCode = '做错';
            stats.做错++;
        } else if (answered.isCorrect) {
            if (disabledUntil && disabledUntil > now) {
                const remaining = Math.ceil((disabledUntil - now) / 1000);
                status = `⏳ 倒计时中 (剩余${remaining}秒, 第${correctCount}次)`;
                statusCode = '倒计时中';
                stats.倒计时中++;
            } else {
                if (correctCount >= 7) {
                    status = `✅ 已完成 (第${correctCount}次)`;
                    statusCode = '已完成';
                    stats.已完成++;
                } else {
                    status = `🔄 待复习 (第${correctCount}次)`;
                    statusCode = '待复习';
                    stats.待复习++;
                }
            }
        }
        
        stats.测试详情.push({
            序号: index + 1,
            测试ID: question.id.substring(0, 8),
            预览: question.question.substring(0, 30),
            状态: statusCode,
            状态详情: status,
            答对次数: correctCount,
            有倒计时: disabledUntil ? '是' : '否',
            倒计时结束时间: disabledUntil ? new Date(disabledUntil).toLocaleTimeString() : '无'
        });
    });
    
    console.log('%c📊 测试详细状态:', 'color: #2196F3; font-weight: bold; font-size: 14px');
    console.table(stats.测试详情);
    
    // 计算记忆总数 = 倒计时中 + 已完成
    const memoryTotal = stats.倒计时中 + stats.已完成;
    
    console.log('%c📈 统计汇总:', 'color: #4CAF50; font-weight: bold');
    console.log(`  总题数: %c${stats.总题数}`, 'color: #ff9800; font-weight: bold');
    console.log(`  ❌ 未做: %c${stats.未做}`, 'color: #F44336');
    console.log(`  ❌ 做错: %c${stats.做错}`, 'color: #F44336');

// ===== 启动单个测试的倒计时更新 =====
startQuestionTimer(questionId, exam, disabledUntil) {
    // 清除可能存在的旧计时器
    if (this._questionTimers && this._questionTimers[questionId]) {
        clearInterval(this._questionTimers[questionId]);
        delete this._questionTimers[questionId];
    }
    
    // 确保 _questionTimers 对象存在
    if (!this._questionTimers) {
        this._questionTimers = {};
    }
    
    console.log(`启动测试 ${questionId.substring(0, 8)} 的倒计时，结束时间:`, new Date(disabledUntil).toLocaleTimeString());
    
    // 创建新的计时器
    const timer = setInterval(() => {
        const now = Date.now();
        const remaining = disabledUntil - now;
        
        // 检查倒计时是否结束
        if (remaining <= 0) {
            console.log(`测试 ${questionId.substring(0, 8)} 倒计时结束`);
            clearInterval(timer);
            delete this._questionTimers[questionId];
            
            // 倒计时结束，更新测试
            if (this.currentExam && exam === this.currentExam) {
                // 获取测试信息
                const question = exam.questions.find(q => q.id === questionId);
                if (!question) return;
                
                // 清除禁用状态和测试记录
                if (exam.answerState) {
                    if (exam.answerState.disabledUntil) {
                        delete exam.answerState.disabledUntil[questionId];
                    }
                    if (exam.answerState.answeredQuestions) {
                        delete exam.answerState.answeredQuestions[questionId];
                    }
                }
                
                // 重新随机选项前，先清除旧的 shuffledOptions
                if (question.shuffledOptions) {
                    delete question.shuffledOptions;
                }
                question.shuffledOptions = this.shuffleArray([...question.options]);
                
                exam.updatedAt = new Date().toISOString();
                Storage.saveExams(this.exams);
                
                // 更新显示
                this.updateQuestionDisplay(questionId, exam);
                this.updateQuestionCountDisplay(exam);
            }
        } else {
            // 倒计时还在进行中，只更新提示区域的文字
            const questionElement = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
            if (questionElement) {
                // 查找提示区域
                const hintDiv = questionElement.querySelector('div[style*="margin-top: 12px; padding-top: 8px; border-top: 1px dashed"]');
                if (hintDiv) {
                    const seconds = Math.ceil(remaining / 1000);
                    const timeText = this.formatTime(seconds);
                    
                    // 更新提示文字 - 答错的情况
                    if (hintDiv.innerHTML.includes('答错了')) {
                        const newHtml = hintDiv.innerHTML.replace(
                            /，[^<]+后可重试/,
                            `，${timeText}后可重试`
                        );
                        if (newHtml !== hintDiv.innerHTML) {
                            hintDiv.innerHTML = newHtml;
                        }
                    }
                    // 更新提示文字 - 答对的情况
                    else if (hintDiv.innerHTML.includes('答对了')) {
                        const newHtml = hintDiv.innerHTML.replace(
                            /，记忆加成还剩[^<]+/,
                            `，记忆加成还剩${timeText}`
                        );
                        if (newHtml !== hintDiv.innerHTML) {
                            hintDiv.innerHTML = newHtml;
                        }
                    }
                }
            }
        }
    }, 200);
    
    this._questionTimers[questionId] = timer;
},

// 检查并解除其他测试的禁用状态
checkAndUnlockOtherQuestions(currentQuestionId) {
    if (!this.currentExam) return;
    
    const exam = this.currentExam;
    const now = Date.now();
    let needsUpdate = false;
    const questionsToUpdate = [];
    
    // 保存当前滚动位置
    const contentArea = document.getElementById('contentArea');
    const scrollTop = contentArea ? contentArea.scrollTop : 0;
    
    // 遍历所有测试
    exam.questions.forEach(question => {
        if (question.id === currentQuestionId) return;
        
        const answered = exam.answerState?.answeredQuestions?.[question.id];
        const disabledUntil = exam.answerState?.disabledUntil?.[question.id];
        
        // 检查倒计时是否结束（无论答对还是答错）
        if (disabledUntil && disabledUntil <= now) {
            // 清除禁用状态
            delete exam.answerState.disabledUntil[question.id];
            
            // 清除测试记录（倒计时结束后测试重置为未测试状态）
            if (exam.answerState.answeredQuestions?.[question.id]) {
                delete exam.answerState.answeredQuestions[question.id];
            }
            
            // 重新随机排序该测试的选项
            if (question.shuffledOptions) {
                delete question.shuffledOptions;
            }
            question.shuffledOptions = this.shuffleArray([...question.options]);
            
            needsUpdate = true;
            questionsToUpdate.push(question.id);
        }
    });
    
    if (needsUpdate) {
        exam.updatedAt = new Date().toISOString();
        Storage.saveExams(this.exams);
        
        // 只更新需要更新的测试
        questionsToUpdate.forEach(questionId => {
            this.updateQuestionDisplay(questionId, exam);
        });
        
        // 恢复滚动位置
        setTimeout(() => {
            if (contentArea) {
                contentArea.scrollTop = scrollTop;
            }
        }, 10);
    }
},

// 更新当前书本的测试数量
_updateCurrentBookQuestionCount() {
    const books = this._currentBooksData || [];
    const book = books[this._selectedBookIndex];
    if (!book) return;
    
    // 不使用标签筛选，直接使用所有单词
    const filteredWords = window.globalWords || [];
    const filteredCardData = this._filterCardDataByWords(filteredWords);
    
    let baseQuestionCount = 0;
    try {
        if (typeof book.getQuestionCount === 'function') {
            window.__tempFilteredWords = filteredWords;
            window.__tempFilteredCardData = filteredCardData;
            baseQuestionCount = book.getQuestionCount();
            delete window.__tempFilteredWords;
            delete window.__tempFilteredCardData;
        } else {
            baseQuestionCount = book.questionCount || 0;
        }
    } catch(e) {
        baseQuestionCount = 0;
    }
    
    // 判断是否支持测试数量调节（只有音节划分和拼读支持）
    const isAdjustable = book.title === '音节划分' || book.title === '音标拼读';
    
    // 获取当前乘数（默认为1）
    let currentMultiplier = this._currentQuestionMultiplier || 1;
    if (!isAdjustable) {
        currentMultiplier = 1;
    }
    
    // 计算实际测试数量
    let actualQuestionCount = baseQuestionCount;
    if (isAdjustable && book.id === 'syllable_division') {
        const targetCounts = { 2: 4, 3: 4, 4: 4, 5: 4, 6: 4 };
        actualQuestionCount = this.calculateSyllableQuestionCount(filteredWords, targetCounts, currentMultiplier);
    } else if (isAdjustable && book.id === 'spell_word_pronunciation') {
        const targetCounts = { 2: 4, 3: 4, 4: 4, 5: 4, 6: 4 };
        actualQuestionCount = this.calculateSpellQuestionCount(filteredWords, targetCounts, currentMultiplier);
    }
    
    // 保存当前乘数到 book 对象
    book.currentMultiplier = currentMultiplier;
    
    const countEl = document.getElementById('currentQuestionCount');
    if (countEl) {
        if (isAdjustable) {
            // 可调节：显示加减号和测试数量
            countEl.innerHTML = `
                <div style="display: flex; align-items: center; ">
                    <button id="decreaseQuestionBtn" style="
                        width: 20px;
                        height: 20px;
                        background: ${currentMultiplier <= 1 ? '#f5f5f5' : '#e5e5e5'};
                        color: ${currentMultiplier <= 1 ? '#d0d0d0' : '#666'};
                        border: none;
                        border-radius: 50%;
                        cursor":" ${currentMultiplier <= 1 ? 'not-allowed' : 'pointer'};
                        font-size: 12px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    ">
                        <i class="fas fa-minus"></i>
                    </button>
                    <span style="min-width: 80px; text-align: center;">随机${actualQuestionCount}题</span>
                    <button id="increaseQuestionBtn" style="
                        width: 20px;
                        height: 20px;
                        background: #e5e5e5;
                        color: #666;
                        border: none;
                        border-radius: 50%;
                        cursor: pointer;
                        font-size: 12px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    ">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            `;
            
            // 重新获取按钮元素并绑定事件（使用 addEventListener 代替 onclick）
            const decreaseBtn = document.getElementById('decreaseQuestionBtn');
            const increaseBtn = document.getElementById('increaseQuestionBtn');
            
            // 移除可能存在的旧事件监听器
            if (decreaseBtn) {
                const newDecreaseBtn = decreaseBtn.cloneNode(true);
                decreaseBtn.parentNode.replaceChild(newDecreaseBtn, decreaseBtn);
                newDecreaseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    if (currentMultiplier > 1) {
                        this._currentQuestionMultiplier = currentMultiplier - 1;
                        this._updateCurrentBookQuestionCount();
                        this._updateCurrentBookDisplay();
                    }
                });
            }
            
            if (increaseBtn) {
                const newIncreaseBtn = increaseBtn.cloneNode(true);
                increaseBtn.parentNode.replaceChild(newIncreaseBtn, increaseBtn);
                newIncreaseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    const maxMultiplier = this.getMaxMultiplier(book, filteredWords);
                    if (currentMultiplier < maxMultiplier) {
                        this._currentQuestionMultiplier = currentMultiplier + 1;
                        this._updateCurrentBookQuestionCount();
                        this._updateCurrentBookDisplay();
                    } else {
                        showToast('已达最大测试数量');
                    }
                });
            }
        } else {
            // 不可调节：只显示测试数量
            countEl.textContent = `${actualQuestionCount}题`;
        }
    }
},

// 计算音节划分测试的实际数量
calculateSyllableQuestionCount(words, targetCounts, multiplier) {
    const validWords = words.filter(w => w.phoneticCount && w.phoneticCount >= 2 && w.syllableDivision);
    
    let totalQuestions = 0;
    for (const [syllableCount, baseNum] of Object.entries(targetCounts)) {
        const count = parseInt(syllableCount);
        const targetNum = baseNum * multiplier;
        const wordsOfCount = validWords.filter(w => w.phoneticCount === count);
        const takeNum = Math.min(targetNum, wordsOfCount.length);
        totalQuestions += takeNum;
    }
    
    return totalQuestions;
},

// 计算拼读测试的实际数量
calculateSpellQuestionCount(words, targetCounts, multiplier) {
    if (!window.SpellWords) return 0;
    
    // 按音节数量分类统计拼读测试
    const validItems = window.SpellWords.filter(item => {
        const matchedWord = words.find(word => {
            if (word.syllablephoneticParts && word.syllablephoneticParts.length > 0) {
                return word.syllablephoneticParts.includes(item.Spellphonetic);
            }
            return false;
        });
        return matchedWord !== undefined;
    });
    
    // 按音节数分组（从 Spellphonetic 或 phoneticParts 推断）
    const itemsBySyllableCount = { 2: [], 3: [], 4: [], 5: [], 6: [] };
    
    validItems.forEach(item => {
        // 通过匹配的单词获取音节数
        const matchedWord = words.find(word => {
            if (word.syllablephoneticParts && word.syllablephoneticParts.length > 0) {
                return word.syllablephoneticParts.includes(item.Spellphonetic);
            }
            return false;
        });
        
        if (matchedWord && matchedWord.phoneticCount) {
            const count = matchedWord.phoneticCount;
            if (itemsBySyllableCount[count]) {
                itemsBySyllableCount[count].push(item);
            }
        }
    });
    
    let totalQuestions = 0;
    for (const [syllableCount, baseNum] of Object.entries(targetCounts)) {
        const count = parseInt(syllableCount);
        const targetNum = baseNum * multiplier;
        const itemsOfCount = itemsBySyllableCount[count] || [];
        const takeNum = Math.min(targetNum, itemsOfCount.length);
        totalQuestions += takeNum;
    }
    
    return totalQuestions;
},

// 获取最大乘数
getMaxMultiplier(book, words) {
    const targetCounts = { 2: 4, 3: 4, 4: 4, 5: 4, 6: 4 };
    let maxMultiplier = 1;
    
    if (book.id === 'syllable_division') {
        const validWords = words.filter(w => w.phoneticCount && w.phoneticCount >= 2 && w.syllableDivision);
        
        for (const [syllableCount, baseNum] of Object.entries(targetCounts)) {
            const count = parseInt(syllableCount);
            const wordsOfCount = validWords.filter(w => w.phoneticCount === count);
            if (wordsOfCount.length > 0) {
                const possibleMultiplier = Math.floor(wordsOfCount.length / baseNum);
                if (possibleMultiplier > maxMultiplier) {
                    maxMultiplier = possibleMultiplier;
                }
            }
        }
    } else if (book.id === 'spell_word_pronunciation' && window.SpellWords) {
        const itemsBySyllableCount = { 2: [], 3: [], 4: [], 5: [], 6: [] };
        
        window.SpellWords.forEach(item => {
            const matchedWord = words.find(word => {
                if (word.syllablephoneticParts && word.syllablephoneticParts.length > 0) {
                    return word.syllablephoneticParts.includes(item.Spellphonetic);
                }
                return false;
            });
            
            if (matchedWord && matchedWord.phoneticCount) {
                const count = matchedWord.phoneticCount;
                if (itemsBySyllableCount[count]) {
                    itemsBySyllableCount[count].push(item);
                }
            }
        });
        
        for (const [syllableCount, baseNum] of Object.entries(targetCounts)) {
            const count = parseInt(syllableCount);
            const itemsOfCount = itemsBySyllableCount[count] || [];
            if (itemsOfCount.length > 0) {
                const possibleMultiplier = Math.floor(itemsOfCount.length / baseNum);
                if (possibleMultiplier > maxMultiplier) {
                    maxMultiplier = possibleMultiplier;
                }
            }
        }
    }
    
    return Math.min(maxMultiplier, 10); // 最大10倍（40题）
},

// 根据筛选后的单词过滤 cardData 音标数据
_filterCardDataByWords(filteredWords) {
    if (!window.cardData) return [];
    if (!filteredWords || filteredWords.length === 0) return window.cardData;
    
    // 收集所有单词中出现的音标
    const usedSymbols = new Set();
    
    filteredWords.forEach(word => {
        if (word.phoneticParts && Array.isArray(word.phoneticParts)) {
            word.phoneticParts.forEach(part => {
                usedSymbols.add(part);
            });
        }
    });
    
    // 过滤 cardData，只保留在单词中出现的音标
    return window.cardData.filter(item => usedSymbols.has(item.symbol));
},

                    </div>
                </div>
            `;
            
            // 递归渲染子标签
            if (Object.keys(childNode.children).length > 0) {
                html += renderTags(childNode, level + 1);
            }
        }
        
        return html;
    };
    
    tagContainer.innerHTML = renderTags(tagTree);
    
    // 添加清除全部按钮
    const clearAllBtn = document.createElement('div');
    clearAllBtn.style.cssText = `
        margin-top: 12px;
        text-align: center;
    `;
    clearAllBtn.innerHTML = `
        <button id="clearAllTagsBtn" style="
            background: none;
            border: none;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 16px;
            transition: all 0.2s;
        " onmouseenter="this.style.background='#f0f0f0'" onmouseleave="this.style.background='none'">
            <i class="fas fa-times-circle"></i> 清除所有筛选
        </button>
    `;
    tagContainer.appendChild(clearAllBtn);
    
    // 绑定标签点击事件
    const tagItems = tagContainer.querySelectorAll('.tag-item');
    tagItems.forEach((item, index) => {
        const wrapper = item.closest('.tag-item-wrapper');
        const tagName = wrapper.dataset.tagName;
        
        item.addEventListener('click', (e) => {
            e.stopPropagation();
            
            if (selectedTags.has(tagName)) {
                selectedTags.delete(tagName);
            } else {
                selectedTags.add(tagName);
            }
            
            this._selectedWordTags = selectedTags;
            
            // 重新渲染标签样式
            this.renderWordTagsFilter(container, modal, books);
            
            // 重新渲染书本列表（更新测试数量）
            if (this._currentBooksData && this._currentBooksContainer) {
                this.renderBooksListWithDynamicCount(
                    this._currentBooksContainer, 
                    modal, 
                    this._currentBooksData, 
                    selectedTags
                );
            }
        });
    });
    
    // 清除所有标签按钮
    const clearBtn = document.getElementById('clearAllTagsBtn');
    if (clearBtn) {

            selectedTags.clear();
            this._selectedWordTags = selectedTags;
            this.renderWordTagsFilter(container, modal, books);
            if (this._currentBooksData && this._currentBooksContainer) {

    }
},

// 处理全局文件上传
handleGlobalFileUpload(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const jsonData = JSON.parse(e.target.result);
            await this.processGlobalImport(jsonData);
        } catch (err) {
            alert('文件解析失败: ' + err.message);
        }
    };
    reader.readAsText(file);
},

// 处理全局数据导入
async processGlobalImport(data) {
    // 验证数据格式
    if (!data.categories || !data.notes || !data.exams) {
        showToast('无效的备份文件格式');
        return;
    }
    
    const ok = await confirmDialog(
        '导入将替换当前所有数据（分类、笔记、测试、兑换记录等），确定要继续吗？',
        '确认导入'
    );
    
    if (!ok) return;
    
    try {
        // 更新数据
        this.categories = data.categories || [{ id: 'default', name: '默认' }];
        this.notes = data.notes || { default: [] };
        this.exams = data.exams || { default: [] };
        this.playTime = data.playTime || {};
        this.exchangeHistory = data.exchangeHistory || [];
        this.insertedNotesMap = data.insertedNotesMap || {};
        this.reverseInsertMap = data.reverseInsertMap || {};
        this.totalScore = data.totalScore || 0;  // ===== 新增 =====
        
        // 确保每个分类都有数组
        this.categories.forEach(cat => {
            if (!this.notes[cat.id]) this.notes[cat.id] = [];
            if (!this.exams[cat.id]) this.exams[cat.id] = [];
        });
        
        // 保存所有数据
        Storage.saveCategories(this.categories);
        Storage.saveNotes(this.notes);
        Storage.saveExams(this.exams);
        localStorage.setItem('toolbar_play_time', JSON.stringify(this.playTime));
        localStorage.setItem('toolbar_exchange_history', JSON.stringify(this.exchangeHistory));
        localStorage.setItem('toolbar_notes_inserts', JSON.stringify(this.insertedNotesMap));
        localStorage.setItem('toolbar_notes_reverse', JSON.stringify(this.reverseInsertMap));
        localStorage.setItem('global_total_score', this.totalScore);  // ===== 新增 =====
        
        // 重新渲染界面
        this.currentCategory = this.categories[0];
        this.currentNote = null;
        this.currentExam = null;
        this.isExamMode = false;
        
        this.renderCategoryList();
        this.renderNotesList();
        this.updateToolbarScore();  // ===== 新增：更新得分显示 =====

    } catch (e) {
        console.error('导入失败:', e);
        showToast('导入失败: ' + e.message);
    }
},

        const ok = await confirmDialog(`确定要删除选中的 ${selectedIds.length} 道测试吗？`);
        if (!ok) return;
        
        // ===== 计算要扣除的总分 =====
        let deductedScore = 0;
        selectedIds.forEach(qid => {
            const questionStat = exam.answerState?.questionStats?.[qid];
            if (questionStat && questionStat.earnedScore) {
                deductedScore += questionStat.earnedScore;
            }
        });
        
        // 清理 answerState 中的残留数据
        if (exam.answerState) {
            selectedIds.forEach(qid => {
                if (exam.answerState.answeredQuestions) {
                    delete exam.answerState.answeredQuestions[qid];
                }
                if (exam.answerState.disabledUntil) {
                    delete exam.answerState.disabledUntil[qid];
                }
                if (exam.answerState.questionStats) {
                    delete exam.answerState.questionStats[qid];
                }
            });
            console.log('已清理 answerState 中的测试数据');
        }
        
        // 过滤掉选中的测试
        exam.questions = exam.questions.filter(q => !selectedIds.includes(q.id));
        
        // ===== 更新总分，如果分数小于0则归零 =====
        if (deductedScore > 0) {
            const newTotalScore = (exam.totalScore || 0) - deductedScore;
            const examPlayTime = this.playTime[exam.id] || 0;
            const newRemainingScore = newTotalScore - examPlayTime;
            
            if (newRemainingScore < 0) {
                // 分数小于0，将总分设置为已兑换时间，使分数归零
                exam.totalScore = examPlayTime;
                console.log(`删除后分数为负数，已将总分调整为 ${examPlayTime}，分数归零`);
            } else {
                exam.totalScore = newTotalScore;
                console.log(`扣除 ${deductedScore} 分，新总分: ${exam.totalScore}`);
            }
        }

            const questionId = btn.dataset.questionId;
            const question = exam.questions.find(q => q.id === questionId);
            if (question) {
                this.showEditQuestionModal(exam, question);
            }
        });
    });

    // 关闭模态框的函数
    const closeModal = () => {
        if (modal && modal.parentNode) {
            modal.style.background = 'rgba(0, 0, 0, 0)';
            const modalContent = modal.querySelector('.manage-modal-content');
            if (modalContent) {
                modalContent.style.opacity = '0';
            }
            
            setTimeout(() => {
                if (modal.parentNode) {
                    document.body.removeChild(modal);
                }
            }, 300);
        }
    };

    // 关闭按钮事件（只有右上角）
    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', closeModal);
    }

    // 点击背景关闭
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });
},

        if (countDisplay) {
            countDisplay.textContent = `已选 ${checkedCount} 个正确选项`;
            countDisplay.style.color = checkedCount === 0 ? '#f44336' : '#4CAF50';
        }
    };

    updateCorrectCountDisplay();
    
    // 正确选项复选框变化事件

        question.knowledgeHint = document.getElementById('editHint').value;
        
        // 更新选项值
        modal.querySelectorAll('.option-item').forEach((item, idx) => {
            const valueInput = item.querySelector('.option-value');
            const value = valueInput.value;
            const isCorrect = item.querySelector('.correct-option-checkbox').checked;
            const optionType = item.dataset.optionType;
            
            if (idx < question.options.length) {
                const opt = question.options[idx];
                
                // 根据data属性中的类型更新值
                if (optionType === 'text') {
                    delete opt.image;
                    delete opt.audio;
                    opt.text = value;
                } else if (optionType === 'image') {
                    delete opt.text;
                    delete opt.audio;
                    opt.image = value;
                } else if (optionType === 'audio') {
                    delete opt.text;
                    delete opt.image;
                    opt.audio = value;
                }
                
                opt.isCorrect = isCorrect;
            }
        });
        
        // 更新正确图片编号和正确音频编号（用于随机化）
        delete question.correctImageNum;
        delete question.correctAudioNum;
        
        const correctOptions = question.options.filter(opt => opt.isCorrect === true);
        if (correctOptions.length === 1) {
            const correctOption = correctOptions[0];
            if (correctOption.image) {
                const match = correctOption.image.match(/image(\d+)\.png/);
                if (match) {
                    question.correctImageNum = parseInt(match[1]);
                }
            } else if (correctOption.audio) {
                const match = correctOption.audio.match(/audioa(\d+)\.mp3/);
                if (match) {
                    question.correctAudioNum = parseInt(match[1]);
                }
            }
        }
        
        // 清除缓存的选项顺序
        if (question.shuffledOptions) {
            delete question.shuffledOptions;
        }
        
        question.updatedAt = new Date().toISOString();
        exam.updatedAt = new Date().toISOString();
        Storage.saveExams(this.exams);
        
        // 重新渲染测试
        this.renderExamEditor(exam);
        modal.remove();
    });
    
    // 取消
    modal.querySelector('.cancel-btn').addEventListener('click', () => {
        modal.remove();
    });
    
    // 点击外部关闭
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.remove();
        }
    });
},

async handleFileUpload(file) {
    try {
        await showRewardedVideo('1507000689', '导入数据功能');
        // 广告完成，执行导入
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const jsonData = JSON.parse(e.target.result);
                this.processImportedData(jsonData);
            } catch (err) {
                alert('文件解析失败: ' + err.message);
            }
        };
        reader.readAsText(file);
    } catch (err) {
        if (err !== '用户取消' && err !== '用户跳过广告') {
            showToast(err || '广告播放失败，请稍后重试');
        }
    }
},

// 处理导入的数据
processImportedData(data) {
    // ===== 优先处理电子书类型 =====
    if (data && data.type === 'interactive_book') {
        console.log('检测到电子书类型，打开电子书');
        this.openInteractiveBook(data);
        return;
    }
    
    // ===== 检查是否是电子书格式（有 cover 和 tableOfContents 字段）=====
    if (data && data.cover && data.tableOfContents) {
        console.log('检测到电子书格式，打开电子书');
        // 包装成标准电子书格式
        const bookData = {
            type: 'interactive_book',
            title: data.title || '音标',
            cover: data.cover,
            tableOfContents: data.tableOfContents
        };
        this.openInteractiveBook(bookData);
        return;
    }
    

    
    // 在 processImportedData 方法中，替换测试模式的处理部分
    if (this.isExamMode && this.currentExam) {
        // 测试模式：验证数据格式
        if (!data.questions || !Array.isArray(data.questions)) {
            showToast('数据格式错误：缺少 questions 数组');
            return;
        }
        
        // ===== 如果有标题，则更新测试标题 =====
        if (data.title && typeof data.title === 'string') {
            this.currentExam.title = data.title;
            // 更新标题输入框
            const titleInput = document.getElementById('examTitle');
            if (titleInput) {
                titleInput.value = data.title;
            }
        }
        
        // 基本格式验证
        for (const q of data.questions) {
            if (!q.question) {
                showToast('测试缺少 question 字段');
                return;
            }
            if (!q.options || !Array.isArray(q.options)) {
                showToast('测试缺少 options 数组');
                return;
            }
        }
        
        // ===== 修改：改为去重和补充 =====
        let newCount = 0;
        let duplicateCount = 0;
        
        for (const newQ of data.questions) {
            // ===== 使用更精确的重复判断逻辑 =====
            let isDuplicate = false;
            
            // 如果是拼读测试（有correctWordInfo字段），根据单词判断
            if (newQ.correctWordInfo && newQ.correctWordInfo.word) {
                isDuplicate = this.currentExam.questions.some(existingQ => {
                    // 检查是否是同一单词的拼读测试
                    return existingQ.correctWordInfo && 
                           existingQ.correctWordInfo.word === newQ.correctWordInfo.word;
                });
            } else {
                // 非拼读测试，使用原有的判断逻辑
                isDuplicate = this.currentExam.questions.some(existingQ => {
                    if (existingQ.question !== newQ.question) return false;
                    if (existingQ.options.length !== newQ.options.length) return false;
                    
                    // 比较每个选项
                    for (let i = 0; i < existingQ.options.length; i++) {
                        const eOpt = existingQ.options[i];
                        const nOpt = newQ.options[i];
                        
                        // 比较文本/图片/音频内容
                        if (eOpt.text !== nOpt.text && 
                            eOpt.image !== nOpt.image && 
                            eOpt.audio !== nOpt.audio) {
                            return false;
                        }
                        if (eOpt.isCorrect !== nOpt.isCorrect) return false;
                    }
                    
                    return true;
                });
            }
            
            if (!isDuplicate) {
                // ===== 新增：如果是拼读测试且 correctWordInfo 中有 id，需要更新 knowledgeHint 中的音频路径 =====
                if (newQ.correctWordInfo && newQ.correctWordInfo.id === 2 && window.SpellWords) {
                    // 查找对应的 SpellWords 项
                    const spellItem = window.SpellWords.find(item => 
                        item.Spellphonetic === newQ.correctWordInfo.phonetic
                    );
                    
                    if (spellItem && spellItem.id === 2 && spellItem.standardAudio2) {
                        console.log(`导入时更新拼读测试 ${newQ.correctWordInfo.phonetic} 的音频路径`);
                        
                        // 更新 correctWordInfo 中的音频路径
                        newQ.correctWordInfo.audio = spellItem.standardAudio2;
                        
                        // 更新选项中的正确选项音频
                        if (newQ.options && Array.isArray(newQ.options)) {
                            newQ.options.forEach(opt => {
                                if (opt.isCorrect) {
                                    opt.audio = spellItem.standardAudio2;
                                }
                            });
                        }
                        
                        // 更新 knowledgeHint 中的音频路径
                        if (newQ.knowledgeHint) {
                            // 替换完整音标音频
                            const fullAudioRegex = new RegExp(`<audio id="sequence_play_[^"]+" src="[^"]+"`, 'g');
                            newQ.knowledgeHint = newQ.knowledgeHint.replace(
                                fullAudioRegex,
                                `<audio id="sequence_play_${newQ.correctWordInfo.phonetic.replace(/[ːˈˈ]/g, '')}" src="${spellItem.standardAudio2}"`
                            );
                            
                            // 替换音标公式中的每个部分音频（格式如 audioa1-2.mp3）
                            if (newQ.correctWordInfo.phoneticParts && newQ.correctWordInfo.phoneticParts.length > 0) {
                                newQ.correctWordInfo.phoneticParts.forEach((part, idx) => {
                                    const audioNum = symbolToAudioMap[part];
                                    if (audioNum) {
                                        const partAudioRegex = new RegExp(`<audio id="part_audio_[^"]+_${idx}" src="[^"]+"`, 'g');
                                        newQ.knowledgeHint = newQ.knowledgeHint.replace(
                                            partAudioRegex,
                                            `<audio id="part_audio_${newQ.correctWordInfo.phonetic.replace(/[ːˈˈ]/g, '')}_${idx}" src="audio/standard/audioa${audioNum}-2.mp3"`
                                        );
                                    }
                                });
                            }
                        }
                    }
                }
                
                // 为新测试生成ID
                newQ.id = 'q_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8) + '_' + newCount;

                // ===== 提取正确图片编号 =====
                // 找出正确选项
                const correctOption = newQ.options.find(opt => opt.isCorrect === true);
                if (correctOption && correctOption.image) {
                    // 从图片路径中提取编号，如 "images/image35.png" -> 35
                    const match = correctOption.image.match(/image(\d+)\.png/);
                    if (match) {
                        newQ.correctImageNum = parseInt(match[1]);
                        console.log('保存正确图片编号:', newQ.correctImageNum);
                    }
                }
                // ===== 提取正确音频编号 =====
                else if (correctOption && correctOption.audio) {
                    // 从音频路径中提取编号，如 "audio/standard/audioa35.mp3" 或 "audio/standard/audioa35-2.mp3" -> 35
                    const match = correctOption.audio.match(/audioa(\d+)(?:-\d+)?\.mp3/);
                    if (match) {
                        newQ.correctAudioNum = parseInt(match[1]);
                        console.log('保存正确音频编号:', newQ.correctAudioNum);
                    }
                }
                
                // 确保每个选项都有正确的字段
                newQ.options.forEach((opt, idx) => {
                    // 确保有isCorrect
                    if (opt.isCorrect === undefined) {
                        opt.isCorrect = false;
                    }
                    // 为选项生成ID
                    opt.id = 'opt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '_' + idx;
                });
                
                // 确保subtitle和knowledgeHint字段存在
                if (newQ.subtitle === undefined) newQ.subtitle = '';
                if (newQ.knowledgeHint === undefined) newQ.knowledgeHint = '';
                
                this.currentExam.questions.push(newQ);
                newCount++;
            } else {
                duplicateCount++;
            }
        }
        
        if (newCount > 0) {
            this.currentExam.updatedAt = new Date().toISOString();
            Storage.saveExams(this.exams);
            
            // 重新渲染
            this.renderExamEditor(this.currentExam);
            
            let message = `成功导入 ${newCount} 道新测试`;
            if (duplicateCount > 0) {
                message += `，跳过 ${duplicateCount} 道重复测试`;
            }
            showToast(message);
        } else {
            showToast('没有新测试，请检查后再试');
        }
            
    } else if (this.currentNote) {
        // ===== 修复：笔记模式导入问题 =====
        const contentDiv = document.getElementById('noteContent');
        if (!contentDiv) return;
        
        const jsonStr = JSON.stringify(data, null, 2);
        const textNode = document.createTextNode('\n' + jsonStr + '\n');
        
        const selection = window.getSelection();
        
        // 检查是否有有效的选择范围且范围在内容区域内
        let hasValidSelection = false;
        
        if (selection.rangeCount > 0) {
            const range = selection.getRangeAt(0);
            // 检查光标是否在内容区域内
            if (contentDiv.contains(range.commonAncestorContainer)) {
                hasValidSelection = true;
                
                // 保存滚动位置
                const scrollTop = contentDiv.scrollTop;
                
                // 在光标位置插入
                range.deleteContents();
                range.insertNode(textNode);
                range.collapse(false);
                
                // 恢复滚动位置
                contentDiv.scrollTop = scrollTop;
            }
        }
        
        // 如果没有有效的光标位置，将内容添加到内容区域的末尾
        if (!hasValidSelection) {
            // 将光标定位到内容末尾
            const range = document.createRange();
            range.selectNodeContents(contentDiv);
            range.collapse(false);
            
            selection.removeAllRanges();
            selection.addRange(range);
            
            // 在末尾插入
            range.insertNode(textNode);
            
            // 将光标移到插入内容后面
            range.setStartAfter(textNode);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
        }
        
        // 触发输入事件
        contentDiv.dispatchEvent(new Event('input', { bubbles: true }));
        
        this.currentNote.content = contentDiv.innerHTML;
        this.currentNote.updatedAt = new Date().toISOString();
        
        // 保存
        this.saveAll(true);
        
    }
},

        `<span class="inserted-link-wrapper" data-insert-id="${insertId}" data-book-id="${book.id}" data-item-type="book" style="

            range.selectNodeContents(contentDiv);
            range.collapse(false);

        range.selectNodeContents(contentDiv);
        range.collapse(false);
    }

    }

    let lastNode = fragment.lastChild;
    if (lastNode && lastNode.parentNode) {
        range.setStartAfter(lastNode);
        range.collapse(true);

        range = document.createRange();
        range.selectNodeContents(contentDiv);
        range.collapse(false);
    }
    selection.removeAllRanges();

            ...n,

        }));

// 重建反向引用映射
rebuildReverseMap() {
    this.reverseInsertMap = {};
    
    // 遍历所有插入映射
    for (const noteId in this.insertedNotesMap) {
        const inserts = this.insertedNotesMap[noteId];
        if (!inserts) continue;
        
        for (const insertId in inserts) {
            const insertData = inserts[insertId];
            if (insertData && insertData.originalNoteId) {
                const originalId = insertData.originalNoteId;
                if (!this.reverseInsertMap[originalId]) {
                    this.reverseInsertMap[originalId] = [];
                }
                // 避免重复添加
                if (!this.reverseInsertMap[originalId].includes(noteId)) {
                    this.reverseInsertMap[originalId].push(noteId);
                }
            }
        }
    }
    
    // 保存
    localStorage.setItem('toolbar_notes_reverse', JSON.stringify(this.reverseInsertMap));

// 更新单个笔记卡片的图标
updateNoteCardIcon(noteId) {
    const card = document.querySelector(`.note-card[data-id="${noteId}"]`);
    if (!card) return;
    
    const footerSpan = card.querySelector('.note-footer span');
    if (!footerSpan) return;
    
    // 获取当前卡片中的时间文本（从DOM中提取）
    let timeText = '';
    const timeIcon = footerSpan.querySelector('.fas.fa-clock');
    if (timeIcon && timeIcon.nextSibling) {
        timeText = timeIcon.nextSibling.nodeValue || '';
    } else {
        // 如果找不到，从innerHTML提取
        const match = footerSpan.innerHTML.match(/<i class="fas fa-clock"><\/i>\s*([^<]+)/);
        if (match) {
            timeText = match[1].trim();
        }
    }
    
    // 判断是否是主笔记
    const isMasterNote = this.insertedNotesMap[noteId] && Object.keys(this.insertedNotesMap[noteId]).length > 0;

const smoothScrollTo = (element, targetPosition, duration = 100) => {
    const startTime = performance.now();
    const startPosition = element.scrollTop;
    const distance = targetPosition - startPosition;
    
    const animateScroll = (currentTime) => {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // 缓动函数：ease-out
        const easeOutProgress = 1 - Math.pow(1 - progress, 3);
        
        element.scrollTop = startPosition + distance * easeOutProgress;
        
        if (progress < 1) {
            requestAnimationFrame(animateScroll);
        }
    };
    
    requestAnimationFrame(animateScroll);
};

// 键盘快捷键
const keyHandler = (e) => {
    if (this.currentNote?.id !== note.id) return;
    
    // 处理删除键（原有代码保持不变）
if (e.key === 'Backspace') {
        e.preventDefault();  // 阻止默认行为
        
        const selection = window.getSelection();
        if (!selection.rangeCount) return;
        
        const range = selection.getRangeAt(0);
        const startContainer = range.startContainer;
        const startOffset = range.startOffset;
        
        // 情况1：光标在文本节点中且有字符 - 正常删除
        if (startContainer.nodeType === Node.TEXT_NODE && startOffset > 0) {
            document.execCommand('delete', false, null);
            return;
        }
        
        // 情况2：光标前是链接块 - 删除链接块
        let nodeToDelete = null;
        let cursorInText = false;
        
        // 检查光标前一个节点
        if (startContainer.nodeType === Node.TEXT_NODE && startOffset === 0) {
            // 光标在文本开头，检查前一个兄弟节点
            const prevSibling = startContainer.previousSibling;
            if (prevSibling && prevSibling.classList && 
                (prevSibling.classList.contains('inserted-link-icon') || 
                 prevSibling.classList.contains('inserted-link-wrapper'))) {
                nodeToDelete = prevSibling;
            }
        } 
        else if (startContainer.nodeType === Node.ELEMENT_NODE) {
            // 光标在元素内，检查前一个兄弟节点
            if (startOffset > 0) {
                const prevNode = startContainer.childNodes[startOffset - 1];
                if (prevNode && prevNode.classList && 
                    (prevNode.classList.contains('inserted-link-icon') || 
                     prevNode.classList.contains('inserted-link-wrapper'))) {
                    nodeToDelete = prevNode;
                }
            } else {
                // 光标在元素开头，检查父元素的前一个兄弟
                const prevSibling = startContainer.previousSibling;
                if (prevSibling && prevSibling.classList && 
                    (prevSibling.classList.contains('inserted-link-icon') || 
                     prevSibling.classList.contains('inserted-link-wrapper'))) {
                    nodeToDelete = prevSibling;
                }
            }
        }
        
        // 情况3：光标就在链接块内 - 删除整个链接块
        let node = startContainer;
        while (node && node !== contentDiv) {
            if (node.nodeType === Node.ELEMENT_NODE && 
                node.classList && 
                (node.classList.contains('inserted-link-icon') || 
                 node.classList.contains('inserted-link-wrapper'))) {
                nodeToDelete = node;
                break;
            }
            node = node.parentNode;
        }
        
        // 如果有要删除的链接块，执行删除
        if (nodeToDelete) {
            // 记录删除位置，用于恢复光标
            const deleteRect = nodeToDelete.getBoundingClientRect();
            const parent = nodeToDelete.parentNode;
            const nextSibling = nodeToDelete.nextSibling;
            
            // 获取插入ID并执行删除
            const insertId = nodeToDelete.dataset.insertId;
            if (insertId) {
                // 先调用删除逻辑
                if (typeof this.removeInsert === 'function') {
                    this.removeInsert(insertId);
                }
                
                // 手动删除DOM元素（确保立即删除）
                setTimeout(() => {
                    if (nodeToDelete.parentNode) {
                        nodeToDelete.remove();
                    }
                }, 0);
                
                // 将光标定位到删除位置
                setTimeout(() => {
                    contentDiv.focus();
                    
                    if (nextSibling) {
                        // 如果有下一个节点，将光标放在它前面
                        const newRange = document.createRange();
                        newRange.setStartBefore(nextSibling);
                        newRange.collapse(true);
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                    } else {
                        // 如果没有下一个节点，放在父节点末尾
                        const newRange = document.createRange();
                        newRange.selectNodeContents(parent || contentDiv);
                        newRange.collapse(false);
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                    }
                }, 10);
            }
            return;
        }
        
        // 情况4：其他情况，默认删除

        // 格式化日期
formatDate(dateString) {
    if (!dateString) return '刚刚';
    const date = new Date(dateString);
    const now = new Date();
    
    const year = date.getFullYear();
    const currentYear = now.getFullYear();
    
    const month = (date.getMonth() + 1).toString().padStart(2, '0');
    const day = date.getDate().toString().padStart(2, '0');
    const hour = date.getHours().toString().padStart(2, '0');
    const minute = date.getMinutes().toString().padStart(2, '0');
    
    // 如果是当前年份，显示月-日 时:分
    if (year === currentYear) {
        return `${month}-${day} ${hour}:${minute}`;
    }
    
    // 如果不是当前年份（更早或未来），只显示年-月-日
    return `${year}-${month}-${day}`;
},
// 格式化时间显示（支持天、小时、分钟、秒）
formatTime(seconds) {
    if (seconds < 60) {
        return `${seconds}秒`;
    } else if (seconds < 3600) {
        const minutes = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return secs > 0 ? `${minutes}分${secs}秒` : `${minutes}分钟`;
    } else if (seconds < 86400) {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        return minutes > 0 ? `${hours}小时${minutes}分` : `${hours}小时`;
    } else {
        const days = Math.floor(seconds / 86400);
        const hours = Math.floor((seconds % 86400) / 3600);
        return hours > 0 ? `${days}天${hours}小时` : `${days}天`;
    }
},
// 格式化数字（添加千位分隔符）
formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
},

undo() {
    if (!this.currentNote) return;
    
    const history = this.history[this.currentNote.id];
    if (!history || history.undo.length <= 1) {
        return;
    }
    
    const current = history.undo.pop();
    history.redo.push(current);
    
    const prev = history.undo[history.undo.length - 1];
    this.currentNote.title = prev.title;
    this.currentNote.content = prev.content;
    
    document.getElementById('noteTitle').value = prev.title;
    const contentDiv = document.getElementById('noteContent');
    if (contentDiv) {
        contentDiv.innerHTML = prev.content;
    }
    
    this.updateUndoRedoButtons();
    this.saveAll(true);
},



redo() {
    if (!this.currentNote) return;
    
    const history = this.history[this.currentNote.id];
    if (!history || history.redo.length === 0) {
        return;
    }
    
    const next = history.redo.pop();
    history.undo.push(next);
    
    this.currentNote.title = next.title;
    this.currentNote.content = next.content;
    
    document.getElementById('noteTitle').value = next.title;
    const contentDiv = document.getElementById('noteContent');
    if (contentDiv) {
        contentDiv.innerHTML = next.content;
    }
    
    this.updateUndoRedoButtons();
    this.saveAll(true);
},

detectRemovedInserts(oldContent, newContent) {
    if (!this.currentNote) return;
    
    const noteId = this.currentNote.id;
    const inserts = this.insertedNotesMap[noteId];
    if (!inserts) return;
    
    // 找出所有在新内容中不存在的插入ID
    const removedInsertIds = [];
    
    for (const insertId in inserts) {
        const metaStart = `<!--insert:${insertId}-->`;
        const metaEnd = `<!--/insert:${insertId}-->`;
        
        const existsInNew = newContent.includes(metaStart) && newContent.includes(metaEnd);
        
        if (!existsInNew) {
            removedInsertIds.push(insertId);
        }
    }
    
    if (removedInsertIds.length > 0) {
        removedInsertIds.forEach(insertId => {
            const insertData = inserts[insertId];
            if (insertData) {
                const originalNoteId = insertData.originalNoteId;
                
                // 从反向引用中移除
                if (originalNoteId && this.reverseInsertMap && this.reverseInsertMap[originalNoteId]) {
                    const index = this.reverseInsertMap[originalNoteId].indexOf(noteId);
                    if (index !== -1) {
                        this.reverseInsertMap[originalNoteId].splice(index, 1);
                    }
                }
                
                delete inserts[insertId];
            }
        });
        
        if (Object.keys(inserts).length === 0) {
            delete this.insertedNotesMap[noteId];
        }
        
        // 只更新当前笔记的图标
        this.updateNoteCardIcon(noteId);
        
        this.saveAll(true);
    }
},


removeInsert(insertId) {
    if (!this.currentNote) return;
    
    const contentDiv = document.getElementById('noteContent');
    if (!contentDiv) return;
    
    // 查找图标元素
    const icon = contentDiv.querySelector(`.inserted-link-icon[data-insert-id="${insertId}"]`);
    if (!icon) return;
    
    const deleteScrollPos = contentDiv.scrollTop;
    
    // 获取图标的位置，用于后续光标定位
    const iconRect = icon.getBoundingClientRect();
    const parentRect = contentDiv.getBoundingClientRect();
    
    // 删除图标
    icon.remove();
    
    // 更新映射
    if (this.insertedNotesMap[this.currentNote.id] && 
        this.insertedNotesMap[this.currentNote.id][insertId]) {
        delete this.insertedNotesMap[this.currentNote.id][insertId];
    }
    
    this.currentNote.content = contentDiv.innerHTML;
    this.currentNote.updatedAt = new Date().toISOString();
    
    contentDiv.dispatchEvent(new Event('input', { bubbles: true }));
    this.saveAll(true);
    
    // 更新笔记卡片图标
    this.updateNoteCardIcon(this.currentNote.id);
    
    // 恢复焦点和光标位置（在删除位置）
    setTimeout(() => {
        contentDiv.focus();
        contentDiv.scrollTop = deleteScrollPos;
        
        // 尝试将光标定位到删除位置
        const selection = window.getSelection();
        const range = document.createRange();
        
        // 找到删除位置后的第一个文本节点或元素
        let node = contentDiv.firstChild;
        let targetNode = null;
        let targetOffset = 0;
        
        while (node) {
            const nodeRect = node.getBoundingClientRect();
            // 找到第一个位置大于删除位置的节点
            if (nodeRect.left > iconRect.left || node === contentDiv.lastChild) {
                targetNode = node;
                break;
            }
            node = node.nextSibling;
        }
        
        if (targetNode) {
            if (targetNode.nodeType === Node.TEXT_NODE) {
                range.setStart(targetNode, 0);
            } else {
                range.setStartBefore(targetNode);
            }
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
        } else {
            // 如果没有找到合适的位置，放在末尾
            range.selectNodeContents(contentDiv);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }
    }, 10);
},

    // ===== 修复：确保 size 是数字并转换为正确的像素值 =====
    let fontSizeValue = size;
    if (typeof size === 'string') {
        // 如果传入的是字符串如 "12px"，提取数字部分
        const match = size.match(/^(\d+)/);
        if (match) {
            fontSizeValue = parseInt(match[1]);
        } else {
            fontSizeValue = 16; // 默认值
        }
    }
    
    const fontSizePx = fontSizeValue + 'px';
    console.log('应用全局字体大小:', fontSizePx);
    
    // ===== 保存当前笔记的字体设置到多个地方 =====
    this.currentNote._globalFontSize = fontSizePx;
    
    // 保存到 localStorage 作为全局备份
    localStorage.setItem('last_used_font_size', fontSizePx);
    
    // 保存到工具栏按钮
    const fontSizeBtn = document.getElementById('fontSizeBtn');
    if (fontSizeBtn) {
        fontSizeBtn.dataset.lastFontSize = fontSizePx;
        console.log('按钮 dataset 已更新:', fontSizeBtn.dataset.lastFontSize);
    }
    
    // 保存当前滚动位置
    const scrollTop = contentDiv.scrollTop;
    
    // 保存光标位置
    const selection = window.getSelection();
    let cursorPosition = 0;
    let cursorNode = null;
    
    if (selection.rangeCount > 0) {
        const range = selection.getRangeAt(0);
        cursorPosition = range.startOffset;
        cursorNode = range.startContainer;
    }
    
    // 获取当前内容
    const currentContent = contentDiv.innerHTML;
    
    // 解析所有插入块，更新它们的字体大小但保持颜色和粗体
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = currentContent;
    
    // 处理所有节点
    const processNode = (node) => {
        if (node.nodeType === Node.TEXT_NODE) {
            // 文本节点，用span包裹设置字体大小
            if (node.textContent.trim()) {
                const span = document.createElement('span');
                span.style.fontSize = fontSizePx;
                span.textContent = node.textContent;
                node.parentNode.replaceChild(span, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE) {
            // 如果是插入块中的标题（包括笔记和测试）
            if (node.classList && node.classList.contains('inserted-title')) {
                // 获取当前样式
                const currentColor = node.style.color;
                const currentFontWeight = node.style.fontWeight;
                
                // 只修改字体大小，保持颜色和粗体不变
                node.style.fontSize = fontSizePx;
                
                // 确保颜色和粗体不变
                if (currentColor) {
                    node.style.color = currentColor;
                }
                if (currentFontWeight) {
                    node.style.fontWeight = currentFontWeight;
                }
                
                // 更新 data 属性
                node.setAttribute('data-font-size', fontSizePx);
                
                // 更新 insertMap 中的样式
                const insertId = node.dataset.insertId;
                if (insertId && this.insertedNotesMap[this.currentNote?.id]?.[insertId]) {
                    const style = this.insertedNotesMap[this.currentNote.id][insertId].style || {};
                    style.fontSize = fontSizePx;
                    // 保持原有的颜色和粗体
                    style.color = currentColor || style.color || 
                        (this.insertedNotesMap[this.currentNote.id][insertId].itemType === 'exam' ? '#FF9800' : '#5f6b7a');
                    style.fontWeight = currentFontWeight || style.fontWeight || '650';
                    this.insertedNotesMap[this.currentNote.id][insertId].style = style;
                }
                
                // 不递归处理子节点，避免重复
                return;
            }
            
            // 如果是插入块容器，只处理其子节点
            if (node.classList && (node.classList.contains('inserted-note-block') || node.classList.contains('inserted-exam-block'))) {
                // 不修改容器本身的样式，只处理其子节点中的标题
                const children = Array.from(node.childNodes);
                children.forEach(child => processNode(child));
                return;
            }
            
            // 其他元素，递归处理子节点
            const children = Array.from(node.childNodes);
            children.forEach(child => processNode(child));
        }
    };
    
    // 处理所有子节点
    const children = Array.from(tempDiv.childNodes);
    children.forEach(child => processNode(child));
    
    // 更新内容
    contentDiv.innerHTML = tempDiv.innerHTML;
    
    // 更新笔记对象的content
    this.currentNote.content = contentDiv.innerHTML;
    this.currentNote.updatedAt = new Date().toISOString();
    
    // 恢复滚动位置
    contentDiv.scrollTop = scrollTop;
    
    // 恢复光标位置
    try {
        if (cursorNode && cursorNode.parentNode) {
            const newRange = document.createRange();
            newRange.setStart(cursorNode, Math.min(cursorPosition, cursorNode.length || 0));
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
        }
    } catch (err) {
        console.log('无法恢复光标位置');
    }
    
    // 触发输入事件
    contentDiv.dispatchEvent(new Event('input', { bubbles: true }));
    
    // 保存
    this._saveNoteContent();
    
    console.log('字体大小应用完成，已保存到笔记:', this.currentNote._globalFontSize);
    console.log('按钮 dataset 当前值:', fontSizeBtn?.dataset.lastFontSize);
},
// 添加确认删除引用的方法
// 添加确认删除引用的方法
confirmRemoveInsert(insertId) {
    if (!this.currentNote) return;
    
    // 查找被引用的项目信息
    const insertData = this.insertedNotesMap[this.currentNote.id]?.[insertId];
    if (!insertData) return;
    
    // 判断是笔记还是测试
    const itemType = insertData.itemType || 'note';
    let itemTitle = '未知';
    
    if (itemType === 'exam') {
        // 查找测试标题
        for (const catId in this.exams) {
            const exam = this.exams[catId].find(e => e.id === insertData.examId);
            if (exam) {
                itemTitle = exam.title || '无标题测试';
                break;
            }
        }
    } else {
        // 查找笔记标题
        for (const catId in this.notes) {
            const note = this.notes[catId].find(n => n.id === insertData.originalNoteId);
            if (note) {
                itemTitle = note.title || '无标题笔记';
                break;
            }
        }
    }
    
    showCustomConfirmDialog(
        '删除引用',
        `确定不再引用【${itemTitle}】？`,
        () => {
            // 确认后执行删除
            this.removeInsert(insertId);
        },
        () => {
            // 取消删除，什么都不做
            console.log('取消删除引用');
        }
    );
},



// 检查并删除空白笔记
checkAndDeleteEmptyNote(note) {
    if (!note) return false;
    
    // 检查是否为空笔记（标题和内容都为空）
    if (!note.title?.trim() && !note.content?.trim()) {
        // 从所在分类中删除
        for (const catId in this.notes) {
            const notes = this.notes[catId] || [];
            const index = notes.findIndex(n => n.id === note.id);
            if (index !== -1) {
                notes.splice(index, 1);
                console.log('自动删除空笔记:', note.id);
                
                // 清理相关的引用映射
                if (this.insertedNotesMap[note.id]) {
                    delete this.insertedNotesMap[note.id];
                }
                
                // 清理反向引用
                for (const originalId in this.reverseInsertMap) {
                    const refIndex = this.reverseInsertMap[originalId]?.indexOf(note.id);
                    if (refIndex !== -1) {
                        this.reverseInsertMap[originalId].splice(refIndex, 1);
                    }
                }
                
                this.saveAll(true);
                return true;
            }
        }
    }
    return false;
},


// 替换 _applyFormatToSelection 方法
_applyFormatToSelection(command, value = null) {
    const contentDiv = document.getElementById('noteContent');
    if (!contentDiv) return;
    
    const selection = window.getSelection();
    if (!selection.rangeCount) return;
    
    // 处理不同命令
    if (command === 'bold') {
        document.execCommand('bold', false, null);
    } 
    else if (command === 'foreColor') {
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, value);
        document.execCommand('styleWithCSS', false, false);
    }
    
    contentDiv.focus();
    
    // 触发输入事件
    contentDiv.dispatchEvent(new Event('input', { bubbles: true }));
},

        return;
    }
    
    this.currentNote.title = newTitle;
    this.currentNote.content = newContent;
    this.currentNote.updatedAt = new Date().toISOString();
    
    // 使用 requestIdleCallback 在空闲时保存
    if ('requestIdleCallback' in window) {

if (this._idleCallback) {
    cancelIdleCallback(this._idleCallback);
    this._idleCallback = null;
}

        this._idleCallback = requestIdleCallback(() => {
            const notesToSave = {};
            for (const catId in this.notes) {
                notesToSave[catId] = this.notes[catId].map(note => ({
                    ...note,

                }));

                ...note,
                content: note.content || ''
            }));
        }
        Storage.saveNotes(notesToSave);
    }
},

// ===== 播放音效 =====
// 修改 playSound 方法
playSound(src) {
    // 检查全局声音是否开启
    const soundEnabled = localStorage.getItem('global_sound_enabled') !== 'false';
    if (!soundEnabled) {
        console.log('全局声音已关闭，跳过音效播放');
        return;
    }
    
    const audio = new Audio(src);
    audio.volume = 0.5;
    audio.play().catch(e => console.log('音效播放失败:', e));
},


// 恢复上次状态
restoreState() {
    // 从 Storage 获取状态
    const state = Storage.getState();
    if (!state) {
        return;
    }
    

    // 优先恢复笔记
    if (state.currentNoteId) {

        // 遍历所有分类查找笔记
        for (const catId in this.notes) {
            const notes = this.notes[catId] || [];
            const note = notes.find(n => n.id === state.currentNoteId);
            
            if (note) {

                // 切换到正确的分类
                const targetCategory = this.categories.find(c => c.id === catId);
                if (targetCategory) {
                    this.currentCategory = targetCategory;
                    this.renderCategoryList();
                    this.renderNotesList();
                }
                
                // 延迟打开笔记
                setTimeout(() => {
                    this.openNote(note);
                }, 200);
                
                return;
            }
        }
        
    }
    
    // 如果没有笔记或没找到笔记，恢复分类
    if (state.currentCategoryId) {
        const category = this.categories.find(c => c.id === state.currentCategoryId);
        if (category) {
            this.currentCategory = category;
        } else {
            this.currentCategory = this.categories[0];
        }
    } else {
        this.currentCategory = this.categories[0];
    }
    
    // 渲染分类和笔记列表
    this.renderCategoryList();
    this.renderNotesList();
}
